<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 4 · 阿贝尔沙堆</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080c10; overflow: hidden; font-family: monospace; color: #ccc; }
canvas { display: block; }
#ui {
  position: fixed; top: 12px; left: 12px;
  font-size: 11px; line-height: 1.6; color: #4df;
  text-shadow: 0 0 8px #4df;
  pointer-events: none;
}
#stats {
  position: fixed; top: 12px; right: 12px;
  font-size: 11px; line-height: 1.8; color: #4df;
  text-align: right; text-shadow: 0 0 6px #4df;
  pointer-events: none;
}
#controls {
  position: fixed; top: 80px; right: 12px;
  display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
}
.ctrl-btn {
  background: rgba(0,60,90,0.3); border: 1px solid #4df;
  color: #4df; padding: 4px 10px; font-family: monospace;
  font-size: 11px; cursor: pointer; border-radius: 3px;
  transition: all 0.2s;
}
.ctrl-btn:hover { background: rgba(0,120,180,0.4); color: #fff; }
#caption {
  position: fixed; bottom: 0; left: 0; right: 0;
  text-align: center; padding: 10px 20px 14px;
  font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
  font-size: 12px; line-height: 1.7; color: #aaa;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  pointer-events: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <a href="../../" style="color:#555;text-decoration:none;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:8px;">← 问野 / ROAM</a>
  <div>▓ NIGHT LAB · N04</div>
  <div>2026-05-01</div>
  <div style="color:#888">阿贝尔沙堆模型</div>
</div>
<div id="stats">
  <div>粒子: <span id="grains">0</span></div>
  <div>崩塌: <span id="avalanches">0</span></div>
</div>
<div id="controls">
  <button class="ctrl-btn" onclick="resetSandpile()">重置</button>
  <button class="ctrl-btn" onclick="toggleSpeed()" id="speed-btn">快速模式</button>
</div>
<div id="caption">「规则只有一条：超过四粒就崩向四个邻居。数百万次崩塌之后，这个完美的圆和圆里繁复的分形图案自己长了出来。这就是"自组织"。」</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const N = 400;
let grid = new Int32Array(N * N);
let totalGrains = 0;
let totalAvalanches = 0;
let fastMode = false;
let imageData;
let imgArr;
let dirty = true;

// Colors: 0=black, 1=navy, 2=royal blue, 3=cyan
const COLORS = [
  [8, 12, 16],      // 0 - near black
  [10, 30, 90],     // 1 - navy
  [30, 80, 200],    // 2 - royal blue
  [0, 210, 255],    // 3 - cyan
];

function idx(x, y) { return y * N + x; }

function resetSandpile() {
  grid = new Int32Array(N * N);
  totalGrains = 0;
  totalAvalanches = 0;
  dirty = true;
  updateStats();
}

function toggleSpeed() {
  fastMode = !fastMode;
  document.getElementById('speed-btn').textContent = fastMode ? '普通模式' : '快速模式';
}

function dropGrain(cx, cy, n) {
  for (let i = 0; i < n; i++) {
    grid[idx(cx, cy)]++;
    totalGrains++;
  }
}

function topple() {
  let avalanche = false;
  const toProcess = [];
  // find all unstable
  for (let y = 1; y < N-1; y++) {
    for (let x = 1; x < N-1; x++) {
      if (grid[idx(x,y)] >= 4) toProcess.push([x,y]);
    }
  }
  if (toProcess.length === 0) return false;

  for (const [x, y] of toProcess) {
    if (grid[idx(x,y)] >= 4) {
      const n = Math.floor(grid[idx(x,y)] / 4);
      grid[idx(x,y)] -= 4 * n;
      grid[idx(x+1,y)] += n;
      grid[idx(x-1,y)] += n;
      grid[idx(x,y+1)] += n;
      grid[idx(x,y-1)] += n;
      // boundary: lose grains at edges
      if (x+1 >= N-1) grid[idx(x+1,y)] = Math.min(grid[idx(x+1,y)], 3);
      if (x-1 <= 0)   grid[idx(x-1,y)] = Math.min(grid[idx(x-1,y)], 3);
      if (y+1 >= N-1) grid[idx(x,y+1)] = Math.min(grid[idx(x,y+1)], 3);
      if (y-1 <= 0)   grid[idx(x,y-1)] = Math.min(grid[idx(x,y-1)], 3);
      totalAvalanches++;
      avalanche = true;
    }
  }
  dirty = true;
  return avalanche;
}

function updateStats() {
  document.getElementById('grains').textContent = totalGrains.toLocaleString();
  document.getElementById('avalanches').textContent = totalAvalanches.toLocaleString();
}

function renderGrid() {
  if (!dirty) return;
  dirty = false;
  const W = canvas.width, H = canvas.height;
  const scaleX = N / W, scaleY = N / H;
  const data = imgArr;

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      const gx = Math.min(N-1, Math.floor(px * scaleX));
      const gy = Math.min(N-1, Math.floor(py * scaleY));
      const v = Math.min(3, grid[gy * N + gx]);
      const c = COLORS[v];
      const pi = (py * W + px) * 4;
      data[pi] = c[0]; data[pi+1] = c[1]; data[pi+2] = c[2]; data[pi+3] = 255;
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

const cx = Math.floor(N / 2), cy = Math.floor(N / 2);
let frameCount = 0;
let stabilized = false;

function loop() {
  const iters = fastMode ? 200 : 10;

  // drop a batch of grains
  dropGrain(cx, cy, iters);

  // topple until stable
  let maxTopples = fastMode ? 2000 : 200;
  for (let i = 0; i < maxTopples; i++) {
    if (!topple()) { stabilized = true; break; }
    stabilized = false;
  }

  if (frameCount % 3 === 0) {
    renderGrid();
    updateStats();
  }
  frameCount++;
  requestAnimationFrame(loop);
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  imageData = ctx.createImageData(canvas.width, canvas.height);
  imgArr = imageData.data;
  dirty = true;
}

resize();
window.addEventListener('resize', () => { resize(); });

// seed initial pile
dropGrain(cx, cy, 65536);
loop();
</script>
</body>
</html>
