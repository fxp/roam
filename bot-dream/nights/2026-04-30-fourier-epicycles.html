<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 6 · 傅里叶本轮</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; overflow: hidden; font-family: monospace; color: #ccc; }
canvas { display: block; cursor: crosshair; }
#ui {
  position: fixed; top: 12px; left: 12px;
  font-size: 11px; line-height: 1.6; color: #fc8;
  text-shadow: 0 0 8px #fc8;
  pointer-events: none;
}
#controls {
  position: fixed; top: 12px; right: 12px;
  display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
}
.mode-btn {
  background: rgba(80,50,0,0.3); border: 1px solid #fc8;
  color: #fc8; padding: 4px 10px; font-family: monospace;
  font-size: 11px; cursor: pointer; border-radius: 3px;
  transition: all 0.2s;
}
.mode-btn:hover, .mode-btn.active { background: rgba(160,100,0,0.45); color: #fff; }
.shape-btn {
  background: rgba(60,40,0,0.25); border: 1px solid #a86;
  color: #c9a; padding: 3px 8px; font-family: monospace;
  font-size: 10px; cursor: pointer; border-radius: 3px;
  transition: all 0.2s;
}
.shape-btn:hover, .shape-btn.active { background: rgba(120,80,0,0.4); color: #fff; border-color: #fc8; }
.slider-row {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: #888;
}
input[type=range] {
  width: 90px; accent-color: #fc8;
}
#draw-hint {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 14px; color: #444; pointer-events: none; text-align: center;
  line-height: 2;
}
#caption {
  position: fixed; bottom: 0; left: 0; right: 0;
  text-align: center; padding: 10px 20px 14px;
  font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
  font-size: 12px; line-height: 1.7; color: #aaa;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  pointer-events: none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div>▓ NIGHT LAB · N06</div>
  <div>2026-04-30</div>
  <div style="color:#888" id="mode-label">傅里叶本轮</div>
</div>
<div id="controls">
  <button class="mode-btn active" onclick="setMode('preset',this)">预设形状</button>
  <button class="mode-btn" onclick="setMode('draw',this)">手绘模式</button>
  <button class="mode-btn" onclick="setMode('auto',this)">自动循环</button>
  <div id="shape-btns" style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
    <button class="shape-btn active" onclick="setShape('square',this)">正方形</button>
    <button class="shape-btn" onclick="setShape('heart',this)">心形</button>
    <button class="shape-btn" onclick="setShape('star',this)">星形</button>
    <button class="shape-btn" onclick="setShape('pi',this)">Pi 符号</button>
  </div>
  <div class="slider-row">
    <span>圆环数</span>
    <input type="range" id="n-slider" min="5" max="200" value="60" oninput="updateN(this.value)">
    <span id="n-val">60</span>
  </div>
  <div class="slider-row">
    <span>速度</span>
    <input type="range" id="speed-slider" min="1" max="10" value="3" oninput="updateSpeed(this.value)">
    <span id="speed-val">3</span>
  </div>
</div>
<div id="draw-hint" style="display:none">在画布上绘制任意曲线<br><span style="font-size:11px;color:#333">松开鼠标后开始重建</span></div>
<div id="caption">「古希腊人用"本轮叠本轮"来解释行星轨迹；傅里叶说任何曲线都可以被旋转圆的叠加精确描述。在交互版里你可以手绘一条线，然后看着旋转圆组合把它重新画出来。」</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let mode = 'preset';
let currentShape = 'square';
let numCircles = 60;
let speed = 3;
let fourier = [];
let path = [];
let time = 0;
let animId = null;
let isDrawing = false;
let drawPoints = [];
let autoShapes = ['square','heart','star','pi'];
let autoIdx = 0;
let autoTimer = 0;

// ---- Shape generators ----
function makeSquare(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = i / n;
    const angle = t * Math.PI * 2;
    // parametric square
    const a = Math.cos(angle), b = Math.sin(angle);
    const r = 1 / Math.max(Math.abs(a), Math.abs(b));
    pts.push({ x: r * a * 160, y: r * b * 160 });
  }
  return pts;
}

function makeHeart(n) {
  const pts = [];
  for (let i = 0; i < n; i++) {
    const t = i / n * Math.PI * 2;
    const x = 160 * (16 * Math.pow(Math.sin(t), 3)) / 16;
    const y = -160 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 13;
    pts.push({ x, y });
  }
  return pts;
}

function makeStar(n) {
  const pts = [];
  const spikes = 5;
  for (let i = 0; i < n; i++) {
    const t = i / n * Math.PI * 2;
    const angle = t;
    const frac = (t % (Math.PI * 2 / spikes)) / (Math.PI * 2 / spikes);
    const r = frac < 0.5
      ? 80 + 80 * (frac * 2)
      : 160 - 80 * ((frac - 0.5) * 2);
    pts.push({ x: r * Math.cos(angle - Math.PI/2), y: r * Math.sin(angle - Math.PI/2) });
  }
  return pts;
}

function makePi(n) {
  // approximate π symbol as a polyline
  const segs = [
    // top bar
    ...Array.from({length:20},(_,i)=>({x:-90+i*9, y:-80})),
    // left leg
    ...Array.from({length:20},(_,i)=>({x:-60, y:-80+i*8})),
    // right leg - curved
    ...Array.from({length:20},(_,i)=>{
      const t = i/19; const a = t*Math.PI;
      return {x: 30+Math.sin(a)*30, y: -80+t*160};
    }),
    // small arch right leg bottom
    ...Array.from({length:10},(_,i)=>{
      const t = i/9; const a = Math.PI+t*Math.PI;
      return {x: 50+Math.cos(a)*20, y: 80+Math.sin(a)*15};
    }),
  ];
  // resample to n points
  const total = segs.length;
  const pts = [];
  for (let i = 0; i < n; i++) {
    const idx = Math.floor(i / n * total);
    pts.push(segs[idx] || segs[total-1]);
  }
  return pts;
}

function getShapePoints(shape) {
  const n = 512;
  switch(shape) {
    case 'square': return makeSquare(n);
    case 'heart':  return makeHeart(n);
    case 'star':   return makeStar(n);
    case 'pi':     return makePi(n);
    default:       return makeSquare(n);
  }
}

// ---- DFT ----
function dft(points) {
  const N = points.length;
  const result = [];
  for (let k = 0; k < N; k++) {
    let re = 0, im = 0;
    for (let n = 0; n < N; n++) {
      const phi = (2 * Math.PI * k * n) / N;
      re += points[n].x * Math.cos(phi) + points[n].y * Math.sin(phi);
      im += -points[n].x * Math.sin(phi) + points[n].y * Math.cos(phi);
    }
    re /= N; im /= N;
    const amp = Math.sqrt(re*re + im*im);
    const phase = Math.atan2(im, re);
    result.push({ re, im, amp, phase, freq: k });
  }
  result.sort((a, b) => b.amp - a.amp);
  return result;
}

function computeFourier(pts) {
  // downsample for speed
  const MAX = 512;
  let sampled = pts;
  if (pts.length > MAX) {
    sampled = [];
    for (let i = 0; i < MAX; i++) {
      sampled.push(pts[Math.floor(i * pts.length / MAX)]);
    }
  }
  fourier = dft(sampled);
  path = [];
  time = 0;
}

function setShape(shape, btn) {
  currentShape = shape;
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const pts = getShapePoints(shape);
  computeFourier(pts);
}

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('shape-btns').style.display = m === 'preset' ? 'flex' : 'none';
  document.getElementById('draw-hint').style.display = m === 'draw' ? 'block' : 'none';
  document.getElementById('mode-label').textContent = m === 'draw' ? '手绘重建' : m === 'auto' ? '自动循环' : '傅里叶本轮';
  if (m === 'preset') setShape(currentShape, null);
  if (m === 'auto') { autoIdx = 0; setShape(autoShapes[0], null); }
  path = []; time = 0;
}

function updateN(v) {
  numCircles = parseInt(v);
  document.getElementById('n-val').textContent = v;
}
function updateSpeed(v) {
  speed = parseInt(v);
  document.getElementById('speed-val').textContent = v;
}

// ---- Drawing ----
function startUserDraw(e) {
  if (mode !== 'draw') return;
  isDrawing = true;
  drawPoints = [];
  path = [];
  fourier = [];
  document.getElementById('draw-hint').style.display = 'none';
  const r = canvas.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left - canvas.width/2;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top - canvas.height/2;
  drawPoints.push({x, y});
}
function continueUserDraw(e) {
  if (!isDrawing || mode !== 'draw') return;
  const r = canvas.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - r.left - canvas.width/2;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - r.top - canvas.height/2;
  drawPoints.push({x, y});
}
function endUserDraw() {
  if (!isDrawing) return;
  isDrawing = false;
  if (drawPoints.length > 10) computeFourier(drawPoints);
}

canvas.addEventListener('mousedown', startUserDraw);
canvas.addEventListener('mousemove', continueUserDraw);
canvas.addEventListener('mouseup', endUserDraw);
canvas.addEventListener('touchstart', e => { e.preventDefault(); startUserDraw(e); }, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); continueUserDraw(e); }, {passive:false});
canvas.addEventListener('touchend', endUserDraw);

// ---- Rendering ----
function drawEpicycles(cx, cy, t, circles) {
  let x = cx, y = cy;
  const N = Math.min(numCircles, circles.length);
  for (let i = 0; i < N; i++) {
    const { amp, freq, phase } = circles[i];
    const angle = freq * t + phase;
    const nx = x + amp * Math.cos(angle);
    const ny = y + amp * Math.sin(angle);

    // draw circle
    ctx.beginPath();
    ctx.arc(x, y, amp, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(180,130,40,0.18)';
    ctx.lineWidth = 0.7;
    ctx.stroke();

    // draw arm
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(nx, ny);
    ctx.strokeStyle = 'rgba(220,160,50,0.55)';
    ctx.lineWidth = 1;
    ctx.stroke();

    x = nx; y = ny;
  }
  return { x, y };
}

let autoCounter = 0;
function loop() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = 'rgba(10,10,10,0.25)';
  ctx.fillRect(0, 0, W, H);

  if (isDrawing && drawPoints.length > 1) {
    // show live drawing
    ctx.strokeStyle = 'rgba(255,200,80,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W/2 + drawPoints[0].x, H/2 + drawPoints[0].y);
    for (const p of drawPoints) ctx.lineTo(W/2 + p.x, H/2 + p.y);
    ctx.stroke();
    animId = requestAnimationFrame(loop);
    return;
  }

  if (fourier.length === 0) {
    animId = requestAnimationFrame(loop);
    return;
  }

  // auto mode cycling
  if (mode === 'auto') {
    autoCounter++;
    const period = Math.floor(fourier.length / Math.max(1, numCircles)) * 300 / speed;
    if (autoCounter > period) {
      autoCounter = 0;
      autoIdx = (autoIdx + 1) % autoShapes.length;
      setShape(autoShapes[autoIdx], null);
    }
  }

  const cx = W / 2, cy = H / 2;
  const dt = (2 * Math.PI) / fourier.length * speed * 0.5;

  // draw faint target path
  if (fourier.length > 0) {
    // reconstruct full target path for ghost
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    const steps = fourier.length;
    for (let s = 0; s <= steps; s++) {
      const t2 = (s / steps) * Math.PI * 2;
      let px = 0, py = 0;
      const N = Math.min(numCircles, fourier.length);
      for (let i = 0; i < N; i++) {
        const { amp, freq, phase } = fourier[i];
        px += amp * Math.cos(freq * t2 + phase);
        py += amp * Math.sin(freq * t2 + phase);
      }
      if (s === 0) ctx.moveTo(cx + px, cy + py);
      else ctx.lineTo(cx + px, cy + py);
    }
    ctx.stroke();
  }

  const tip = drawEpicycles(cx, cy, time, fourier);
  path.push({ x: tip.x, y: tip.y });

  // keep path to one full cycle
  const maxLen = Math.floor(fourier.length / Math.max(0.1, speed) * 0.5);
  if (path.length > maxLen) path.shift();

  // draw traced path
  if (path.length > 1) {
    ctx.beginPath();
    ctx.moveTo(path[0].x, path[0].y);
    for (let i = 1; i < path.length; i++) {
      const alpha = i / path.length;
      ctx.lineTo(path[i].x, path[i].y);
    }
    ctx.strokeStyle = 'rgba(180,240,255,0.9)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#80dfff';
    ctx.shadowBlur = 4;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // dot at tip
  ctx.beginPath();
  ctx.arc(tip.x, tip.y, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  time += dt;
  if (time > Math.PI * 2) { time -= Math.PI * 2; path = []; }

  animId = requestAnimationFrame(loop);
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resize();
window.addEventListener('resize', () => { resize(); path = []; });

// Initial
setShape('square', document.querySelector('.shape-btn.active'));
loop();
</script>
</body>
</html>
