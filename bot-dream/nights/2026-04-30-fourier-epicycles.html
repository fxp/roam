<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fourier Epicycles — Arbitrary Curve Decomposition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080f;
    color: #c0d0e0;
    font-family: 'Courier New', monospace;
    display: flex;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }
  #sidebar {
    width: 170px;
    background: #0c0c18;
    border-right: 1px solid #1a2030;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  #sidebar h3 {
    font-size: 10px;
    color: #3a5070;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 2px;
    padding-bottom: 4px;
    border-bottom: 1px solid #1a2030;
  }
  .shape-btn {
    background: #111220;
    border: 1px solid #1e2a38;
    color: #8aabb8;
    padding: 7px 10px;
    cursor: pointer;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    text-align: left;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .shape-btn:hover {
    background: #182030;
    border-color: #2a507a;
    color: #aaccdd;
  }
  .shape-btn.active {
    background: #0d2035;
    border-color: #2a7aaa;
    color: #4af;
    box-shadow: 0 0 8px #0a4a7a44;
  }
  #drawBtn {
    background: #180d25;
    border: 1px solid #3a1a5a;
    color: #aa7add;
  }
  #drawBtn:hover {
    background: #240f35;
    border-color: #6a3a9a;
    color: #cc99ff;
  }
  #drawBtn.active {
    background: #1a0830;
    border-color: #8a3acc;
    color: #cc77ff;
    box-shadow: 0 0 10px #5a1aaa44;
  }
  #right-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #top-bar {
    background: #0c0c18;
    border-bottom: 1px solid #1a2030;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }
  #shape-title {
    font-size: 16px;
    font-weight: bold;
    color: #4af;
    min-width: 180px;
  }
  #epi-info {
    font-size: 11px;
    color: #4a6a7a;
    flex: 1;
  }
  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #080810;
    position: relative;
  }
  #mainCanvas {
    display: block;
    cursor: default;
    width: 100%;
    height: 100%;
  }
  #mainCanvas.draw-mode {
    cursor: crosshair;
  }
  #draw-hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a0830cc;
    border: 1px solid #6a3a9a;
    color: #cc99ff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    display: none;
    pointer-events: none;
  }
  #controls {
    background: #0c0c18;
    border-top: 1px solid #1a2030;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ctrl-label {
    font-size: 11px;
    color: #5a7a8a;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 120px;
    height: 4px;
    background: #1a2a3a;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #2a7aaa;
    cursor: pointer;
  }
  .ctrl-val {
    font-size: 12px;
    color: #4af;
    min-width: 36px;
    text-align: left;
  }
  #toggleCircles {
    background: #121a2a;
    border: 1px solid #2a4a6a;
    color: #7abacc;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    transition: all 0.15s;
  }
  #toggleCircles:hover {
    background: #1a2a3a;
    border-color: #3a7aaa;
    color: #4af;
  }
</style>
</head>
<body>
<div id="sidebar">
  <h3>Shapes</h3>
  <button class="shape-btn active" data-shape="heart">❤ Heart</button>
  <button class="shape-btn" data-shape="pi">π Letter Pi</button>
  <button class="shape-btn" data-shape="star">★ Star (5-point)</button>
  <button class="shape-btn" data-shape="butterfly">⋈ Butterfly</button>
  <button class="shape-btn" data-shape="lissajous">∞ Lissajous 3:2</button>
  <button class="shape-btn" data-shape="rose">✿ Rose (k=3)</button>
  <button class="shape-btn" data-shape="smiley">☺ Smiley</button>
  <button class="shape-btn" data-shape="spiral">@ Archimedean</button>
  <div style="margin-top:8px; border-top:1px solid #1a2030; padding-top:8px;">
    <h3>Custom</h3>
  </div>
  <button class="shape-btn" id="drawBtn" data-shape="draw">✏ Freehand</button>
</div>
<div id="right-panel">
  <div id="top-bar">
    <div id="shape-title">Heart Curve</div>
    <div id="epi-info">DFT decomposed into <span id="epiTotal">256</span> epicycles · showing <span id="epiShown">128</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="mainCanvas"></canvas>
    <div id="draw-hint">Draw your shape! Release to transform.</div>
  </div>
  <div id="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Epicycles</span>
      <input type="range" id="epicycleSlider" min="1" max="256" value="128" step="1">
      <span class="ctrl-val" id="epiVal">128</span>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Speed</span>
      <input type="range" id="speedSlider" min="1" max="60" value="10" step="1">
      <span class="ctrl-val" id="speedVal">1.0x</span>
    </div>
    <button id="toggleCircles">Hide Circles</button>
  </div>
</div>

<script>
let CW, CH;
const N = 256;
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

let showCircles = true;
let t = 0;
let speed = 10;
let numEpicycles = 128;
let animId = null;
let drawMode = false;
let isDrawing = false;
let drawPoints = [];
let currentShape = 'heart';

// Precomputed shape points and DFT coefficients
let shapePts = [];
let dftCoeffs = [];
let trailPts = [];

// ---- Shape generators ----
function sampleShape(name) {
  const pts = [];
  if (name === 'heart') {
    for (let i = 0; i < N; i++) {
      const t = 2*Math.PI*i/N;
      const x = 16*Math.pow(Math.sin(t),3);
      const y = -(13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t));
      pts.push([x*12, y*12]);
    }
  } else if (name === 'pi') {
    // Draw a rough π shape using parametric segments
    // Top bar: left to right, then two legs down
    for (let i = 0; i < N; i++) {
      const t = i / N;
      let x, y;
      if (t < 0.15) {
        // top bar
        x = -130 + (t/0.15)*260;
        y = -80;
      } else if (t < 0.30) {
        // right leg going down
        const s = (t-0.15)/0.15;
        x = 80;
        y = -80 + s*150;
      } else if (t < 0.38) {
        // right foot curve
        const s = (t-0.30)/0.08;
        x = 80 + s*25;
        y = 70 + s*15;
      } else if (t < 0.55) {
        // back up right leg inner
        const s = (t-0.38)/0.17;
        x = 105 - s*60;
        y = 85 - s*165;
      } else if (t < 0.65) {
        // middle gap
        const s = (t-0.55)/0.10;
        x = 45 - s*90;
        y = -80;
      } else if (t < 0.80) {
        // left leg down
        const s = (t-0.65)/0.15;
        x = -45;
        y = -80 + s*155;
      } else if (t < 0.88) {
        // left foot curve
        const s = (t-0.80)/0.08;
        x = -45 - s*25;
        y = 75 + s*15;
      } else if (t < 1.0) {
        // back up left leg inner
        const s = (t-0.88)/0.12;
        x = -70 + s*(-60);
        y = 90 - s*170;
      }
      pts.push([x, y]);
    }
  } else if (name === 'star') {
    const outerR = 160, innerR = 65;
    for (let i = 0; i < N; i++) {
      const angle = 2*Math.PI*i/N;
      const spikes = 5;
      const ratio = i / N * spikes;
      const frac = ratio - Math.floor(ratio);
      let r;
      if (frac < 0.5) r = outerR + (innerR - outerR) * (frac*2);
      else r = innerR + (outerR - innerR) * ((frac-0.5)*2);
      pts.push([r*Math.cos(angle - Math.PI/2), r*Math.sin(angle - Math.PI/2)]);
    }
  } else if (name === 'butterfly') {
    for (let i = 0; i < N; i++) {
      const t = 2*Math.PI*i/N;
      // butterfly curve: r = e^sin(θ) - 2cos(4θ) + sin^5((2θ-π)/24)
      const r = Math.exp(Math.sin(t)) - 2*Math.cos(4*t) + Math.pow(Math.sin((2*t-Math.PI)/24), 5);
      pts.push([r*Math.cos(t)*70, -r*Math.sin(t)*70]);
    }
  } else if (name === 'lissajous') {
    for (let i = 0; i < N; i++) {
      const t = 2*Math.PI*i/N;
      const x = 180 * Math.sin(3*t + Math.PI/4);
      const y = 180 * Math.sin(2*t);
      pts.push([x, y]);
    }
  } else if (name === 'rose') {
    for (let i = 0; i < N; i++) {
      const t = 2*Math.PI*i/N;
      const r = 180 * Math.cos(3*t);
      pts.push([r*Math.cos(t), r*Math.sin(t)]);
    }
  } else if (name === 'smiley') {
    // Big circle outline + eyes + smile composed in sequence
    for (let i = 0; i < N; i++) {
      const s = i / N;
      let x, y;
      if (s < 0.40) {
        // Main face circle
        const a = 2*Math.PI*(s/0.40);
        x = 160*Math.cos(a - Math.PI/2);
        y = 160*Math.sin(a - Math.PI/2);
      } else if (s < 0.52) {
        // Left eye
        const a = 2*Math.PI*((s-0.40)/0.12);
        x = -65 + 28*Math.cos(a);
        y = -55 + 22*Math.sin(a);
      } else if (s < 0.64) {
        // Right eye
        const a = 2*Math.PI*((s-0.52)/0.12);
        x = 65 + 28*Math.cos(a);
        y = -55 + 22*Math.sin(a);
      } else {
        // Smile arc
        const a = Math.PI*0.15 + Math.PI*0.70*((s-0.64)/0.36);
        x = 115*Math.cos(a);
        y = 60 + 90*Math.sin(a);
      }
      pts.push([x, y]);
    }
  } else if (name === 'spiral') {
    // Archimedean spiral r = a*θ, 3 full turns
    const turns = 3;
    for (let i = 0; i < N; i++) {
      const t = 2*Math.PI*turns*i/N;
      const r = (t/(2*Math.PI*turns))*200;
      pts.push([r*Math.cos(t), r*Math.sin(t)]);
    }
  } else if (name === 'draw') {
    return drawPoints.slice(0, N);
  }
  return pts;
}

function computeDFT(pts) {
  const n = pts.length;
  const coeffs = [];
  for (let k = 0; k < n; k++) {
    let re = 0, im = 0;
    for (let j = 0; j < n; j++) {
      const angle = -2*Math.PI*k*j/n;
      re += pts[j][0]*Math.cos(angle) - pts[j][1]*Math.sin(angle);
      im += pts[j][0]*Math.sin(angle) + pts[j][1]*Math.cos(angle);
    }
    re /= n; im /= n;
    coeffs.push({
      freq: k,
      amp:  Math.sqrt(re*re + im*im),
      phase: Math.atan2(im, re),
      re, im
    });
  }
  // Sort by amplitude descending
  coeffs.sort((a, b) => b.amp - a.amp);
  return coeffs;
}

// Fast DFT using direct computation (N=256 is fine)
function loadShape(name) {
  const raw = sampleShape(name);
  if (!raw || raw.length < 4) return;
  shapePts = raw;
  // Center
  let cx = 0, cy = 0;
  for (const [x,y] of shapePts) { cx += x; cy += y; }
  cx /= shapePts.length; cy /= shapePts.length;
  shapePts = shapePts.map(([x,y]) => [x-cx, y-cy]);
  dftCoeffs = computeDFT(shapePts);
  trailPts = [];
  t = 0;
  numEpicycles = Math.min(numEpicycles, dftCoeffs.length);
  document.getElementById('epiTotal').textContent = dftCoeffs.length;
  document.getElementById('epiShown').textContent = numEpicycles;
  document.getElementById('epicycleSlider').max = dftCoeffs.length;
}

function draw() {
  ctx.clearRect(0, 0, CW, CH);

  // Background
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, CW, CH);

  // Center
  const cx = CW/2, cy = CH/2;

  if (dftCoeffs.length === 0) {
    ctx.fillStyle = '#2a3a4a';
    ctx.font = '14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('Select a shape or draw one!', cx, cy);
    return;
  }

  // Draw epicycles
  let px = cx, py = cy;
  const active = dftCoeffs.slice(0, numEpicycles);

  if (showCircles) {
    for (const c of active) {
      const nx = px + c.amp * Math.cos(c.phase + 2*Math.PI*c.freq*t/N + Math.PI/2);
      const ny = py + c.amp * Math.sin(c.phase + 2*Math.PI*c.freq*t/N + Math.PI/2);
      // Draw circle
      ctx.beginPath();
      ctx.arc(px, py, c.amp, 0, 2*Math.PI);
      ctx.strokeStyle = 'rgba(40,90,130,0.3)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      // Draw arm
      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(nx, ny);
      ctx.strokeStyle = 'rgba(60,130,180,0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();
      px = nx; py = ny;
    }
  } else {
    // Just compute position without drawing
    for (const c of active) {
      px += c.amp * Math.cos(c.phase + 2*Math.PI*c.freq*t/N + Math.PI/2);
      py += c.amp * Math.sin(c.phase + 2*Math.PI*c.freq*t/N + Math.PI/2);
    }
  }

  // Trail point
  trailPts.push([px, py]);
  if (trailPts.length > N + 5) trailPts.shift();

  // Draw trail
  if (trailPts.length > 1) {
    ctx.beginPath();
    ctx.moveTo(trailPts[0][0], trailPts[0][1]);
    for (let i = 1; i < trailPts.length; i++) {
      ctx.lineTo(trailPts[i][0], trailPts[i][1]);
    }
    ctx.strokeStyle = '#22ffcc';
    ctx.lineWidth = 1.8;
    ctx.shadowColor = '#00ffaa';
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Draw endpoint dot
  ctx.beginPath();
  ctx.arc(px, py, 2.5, 0, 2*Math.PI);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
}

function loop() {
  t = (t + speed/10) % N;
  draw();
  animId = requestAnimationFrame(loop);
}

// ---- Draw mode ----
function startDrawMode() {
  drawMode = true;
  canvas.classList.add('draw-mode');
  document.getElementById('draw-hint').style.display = 'block';
  drawPoints = [];
  trailPts = [];
  dftCoeffs = [];
  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, CW, CH);
}

function stopDrawMode() {
  drawMode = false;
  canvas.classList.remove('draw-mode');
  document.getElementById('draw-hint').style.display = 'none';
}

canvas.addEventListener('mousedown', e => {
  if (!drawMode) return;
  isDrawing = true;
  drawPoints = [];
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (CW/r.width) - CW/2;
  const y = (e.clientY - r.top)  * (CH/r.height) - CH/2;
  drawPoints.push([x, y]);
});

canvas.addEventListener('mousemove', e => {
  if (!drawMode || !isDrawing) return;
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (CW/r.width) - CW/2;
  const y = (e.clientY - r.top)  * (CH/r.height) - CH/2;
  drawPoints.push([x, y]);
  // Preview drawing
  ctx.clearRect(0, 0, CW, CH);
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, CW, CH);
  if (drawPoints.length > 1) {
    ctx.beginPath();
    ctx.moveTo(drawPoints[0][0]+CW/2, drawPoints[0][1]+CH/2);
    for (let i = 1; i < drawPoints.length; i++) {
      ctx.lineTo(drawPoints[i][0]+CW/2, drawPoints[i][1]+CH/2);
    }
    ctx.strokeStyle = '#cc88ff';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
});

canvas.addEventListener('mouseup', e => {
  if (!drawMode || !isDrawing) return;
  isDrawing = false;
  if (drawPoints.length < 8) return;
  // Resample to N points
  const total = drawPoints.length;
  const resampled = [];
  for (let i = 0; i < N; i++) {
    const idx = Math.floor(i * total / N);
    resampled.push(drawPoints[idx]);
  }
  drawPoints = resampled;
  stopDrawMode();
  currentShape = 'draw';
  loadShape('draw');
  document.getElementById('shape-title').textContent = 'Freehand Drawing';
  document.getElementById('epi-info').querySelector('span:last-child').textContent = numEpicycles;
});

// Shape buttons
document.querySelectorAll('.shape-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const shape = btn.dataset.shape;
    document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (shape === 'draw') {
      startDrawMode();
      return;
    }
    if (drawMode) stopDrawMode();
    currentShape = shape;
    const names = {
      heart: 'Heart Curve',
      pi: 'Letter π',
      star: '5-Point Star',
      butterfly: 'Butterfly Curve',
      lissajous: 'Lissajous (3:2)',
      rose: 'Rose Curve (k=3)',
      smiley: 'Smiley Face',
      spiral: 'Archimedean Spiral'
    };
    document.getElementById('shape-title').textContent = names[shape] || shape;
    loadShape(shape);
    document.getElementById('epiShown').textContent = numEpicycles;
  });
});

document.getElementById('epicycleSlider').addEventListener('input', e => {
  numEpicycles = parseInt(e.target.value);
  document.getElementById('epiVal').textContent = numEpicycles;
  document.getElementById('epiShown').textContent = numEpicycles;
  trailPts = [];
});

document.getElementById('speedSlider').addEventListener('input', e => {
  speed = parseInt(e.target.value);
  document.getElementById('speedVal').textContent = (speed/10).toFixed(1) + 'x';
});

document.getElementById('toggleCircles').addEventListener('click', () => {
  showCircles = !showCircles;
  document.getElementById('toggleCircles').textContent = showCircles ? 'Hide Circles' : 'Show Circles';
});

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  CW = wrap.clientWidth;
  CH = wrap.clientHeight;
  canvas.width = CW;
  canvas.height = CH;
  trailPts = [];
}
window.addEventListener('resize', resize);

// Init
resize();
loadShape('heart');
loop();
</script>
</body>
</html>
