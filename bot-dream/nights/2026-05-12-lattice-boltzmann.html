<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 15 · 格子玻尔兹曼：流体从碰撞中涌现</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; }

#label {
  position: absolute; top: 12px; left: 14px; z-index: 10;
  font-size: 11px; color: #888; line-height: 1.6; pointer-events: none;
}

#controls {
  position: absolute; top: 12px; right: 14px; z-index: 10;
  display: flex; flex-direction: column; gap: 8px;
  background: rgba(0,0,0,0.75); padding: 12px; border: 1px solid #333;
  min-width: 230px;
}
.ctrl-row { display: flex; flex-direction: column; gap: 4px; }
.ctrl-row label { font-size: 11px; color: #aaa; }
.ctrl-row input[type=range] { width: 100%; accent-color: #06b6d4; }
.ctrl-marks { display: flex; justify-content: space-between; font-size: 9px; color: #666; }
.stat { font-size: 12px; color: #06b6d4; }
.stat span { color: #fff; }
.btn-row { display: flex; gap: 5px; flex-wrap: wrap; }
button {
  font-family: 'Courier New', monospace; font-size: 10px;
  background: #111; border: 1px solid #444; color: #ccc;
  padding: 5px 8px; cursor: pointer; border-radius: 2px;
}
button:hover { background: #222; border-color: #666; color: #fff; }
button.active { background: #0c2830; border-color: #06b6d4; color: #22d3ee; }
.sep { border-top: 1px solid #333; margin-top: 4px; padding-top: 4px; }
#karman-label {
  position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: #f59e0b; pointer-events: none; z-index: 10;
  opacity: 0; transition: opacity 0.5s;
  font-family: 'Courier New', monospace;
}
#caption {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: #666; text-align: center; max-width: 720px;
  line-height: 1.7; pointer-events: none; font-family: sans-serif; z-index: 10;
}
canvas { display: block; }
</style>
</head>
<body>

<div id="label">
  Night 15 · 2026-05-12<br>格子玻尔兹曼 · 流体涌现
</div>

<div id="controls">
  <div class="ctrl-row">
    <label>雷诺数 Re = <span id="re-val">100</span></label>
    <input type="range" id="re-slider" min="20" max="220" step="5" value="100">
    <div class="ctrl-marks"><span>20 层流</span><span>220 湍流</span></div>
  </div>
  <div class="stat">时间步 = <span id="step-val">0</span></div>
  <div class="btn-row sep">
    <label style="font-size:11px;color:#888;width:100%">可视化模式</label>
    <button id="btn-vort" class="active" onclick="setViz('vort')">涡量</button>
    <button id="btn-speed" onclick="setViz('speed')">速度</button>
    <button id="btn-press" onclick="setViz('press')">压力</button>
  </div>
  <div class="btn-row sep">
    <button onclick="resetLBM()">重置流场</button>
  </div>
  <div class="stat sep" style="color:#555;font-size:10px;">
    D2Q9 · 200×100 格点<br>Bhatnagar-Gross-Krook
  </div>
</div>

<div id="karman-label">卡门涡街 Kármán Vortex Street</div>
<canvas id="main"></canvas>

<div id="caption">「流体的宏观行为——漩涡、湍流、压力——从数以亿计的分子碰撞中涌现。格子玻尔兹曼不直接解流体方程；它让分子按规则碰撞，然后等流体自己出现。」</div>

<script>
// D2Q9 Lattice Boltzmann
const NX = 200, NY = 100;
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');
let W, H;

// D2Q9 weights and velocities
const W9 = [4/9, 1/9, 1/9, 1/9, 1/9, 1/36, 1/36, 1/36, 1/36];
const CX = [0,  1,  0, -1,  0,  1, -1, -1,  1];
const CY = [0,  0,  1,  0, -1,  1,  1, -1, -1];
const OPP = [0, 3, 4, 1, 2, 7, 8, 5, 6]; // opposite direction indices

let Re = 100;
let vizMode = 'vort';
let stepCount = 0;

// Distribution functions
let f  = new Float32Array(NX * NY * 9);
let fTmp = new Float32Array(NX * NY * 9);

// Macroscopic fields
let rho = new Float32Array(NX * NY);
let ux  = new Float32Array(NX * NY);
let uy  = new Float32Array(NX * NY);
let obstacle = new Uint8Array(NX * NY);

// Tracer particles
const NUM_TRACERS = 500;
let tracerX = new Float32Array(NUM_TRACERS);
let tracerY = new Float32Array(NUM_TRACERS);
const TRAIL_LEN = 18;
let trailX = [];
let trailY = [];
for (let i = 0; i < NUM_TRACERS; i++) {
  trailX.push(new Float32Array(TRAIL_LEN));
  trailY.push(new Float32Array(TRAIL_LEN));
}
let trailHead = 0;

// Obstacle: cylinder at ~1/3 from left, centered vertically
const CYL_X = Math.floor(NX * 0.28);
const CYL_Y = Math.floor(NY * 0.5);
const CYL_R = Math.floor(NY * 0.12);

function setupObstacle() {
  obstacle.fill(0);
  for (let y = 0; y < NY; y++) {
    for (let x = 0; x < NX; x++) {
      const dx2 = x - CYL_X, dy2 = y - CYL_Y;
      if (dx2 * dx2 + dy2 * dy2 <= CYL_R * CYL_R) {
        obstacle[y * NX + x] = 1;
      }
    }
  }
}

function feq(k, rhoVal, uxVal, uyVal) {
  const uc = CX[k] * uxVal + CY[k] * uyVal;
  const u2 = uxVal * uxVal + uyVal * uyVal;
  return W9[k] * rhoVal * (1 + 3 * uc + 4.5 * uc * uc - 1.5 * u2);
}

function resetLBM() {
  stepCount = 0;
  const u0 = 0.1;
  for (let y = 0; y < NY; y++) {
    for (let x = 0; x < NX; x++) {
      const i = y * NX + x;
      const noiseX = (Math.random() - 0.5) * 0.002;
      const noiseY = (Math.random() - 0.5) * 0.002;
      rho[i] = 1.0;
      ux[i] = u0 + noiseX;
      uy[i] = noiseY;
      for (let k = 0; k < 9; k++) {
        f[i * 9 + k] = feq(k, 1.0, u0 + noiseX, noiseY);
      }
    }
  }
  // Scatter tracers on the right 2/3 of grid, avoiding obstacle
  for (let i = 0; i < NUM_TRACERS; i++) {
    resetTracer(i);
    // stagger initial positions
    tracerX[i] = Math.random() * NX;
    tracerY[i] = Math.random() * NY;
    for (let t2 = 0; t2 < TRAIL_LEN; t2++) {
      trailX[i][t2] = tracerX[i];
      trailY[i][t2] = tracerY[i];
    }
  }
}

function resetTracer(i) {
  // Re-inject at left edge
  tracerX[i] = Math.random() * NX * 0.05;
  tracerY[i] = 2 + Math.random() * (NY - 4);
}

function stepLBM() {
  const tau = getOmegaFromRe();
  const omega = 1.0 / tau;
  const u0 = 0.1;

  // Collision
  for (let y = 0; y < NY; y++) {
    for (let x = 0; x < NX; x++) {
      const i = y * NX + x;
      if (obstacle[i]) continue;
      // Compute macroscopic
      let r = 0, vx = 0, vy = 0;
      for (let k = 0; k < 9; k++) {
        const fk = f[i * 9 + k];
        r += fk;
        vx += CX[k] * fk;
        vy += CY[k] * fk;
      }
      rho[i] = r;
      ux[i] = vx / r;
      uy[i] = vy / r;
      // BGK collision
      for (let k = 0; k < 9; k++) {
        f[i * 9 + k] += omega * (feq(k, r, vx / r, vy / r) - f[i * 9 + k]);
      }
    }
  }

  // Streaming
  fTmp.fill(0);
  for (let y = 0; y < NY; y++) {
    for (let x = 0; x < NX; x++) {
      const i = y * NX + x;
      if (obstacle[i]) continue;
      for (let k = 0; k < 9; k++) {
        let nx2 = x + CX[k], ny2 = y + CY[k];
        // Periodic left/right boundaries only for y
        if (ny2 < 0) ny2 = NY - 1;
        if (ny2 >= NY) ny2 = 0;
        // Inlet at left (x=0): inject flow
        if (nx2 < 0) {
          // Inlet: set equilibrium
          fTmp[i * 9 + k] = feq(k, 1.0, u0, 0);
          continue;
        }
        // Outlet at right (absorb): copy last column
        if (nx2 >= NX) nx2 = NX - 1;
        const ni = ny2 * NX + nx2;
        if (obstacle[ni]) {
          // Bounce-back
          fTmp[i * 9 + OPP[k]] += f[i * 9 + k];
        } else {
          fTmp[ni * 9 + k] += f[i * 9 + k];
        }
      }
    }
  }

  // Apply inlet BC on x=0
  for (let y = 0; y < NY; y++) {
    const i = y * NX + 0;
    for (let k = 0; k < 9; k++) {
      fTmp[i * 9 + k] = feq(k, 1.0, u0, 0);
    }
    rho[i] = 1.0; ux[i] = u0; uy[i] = 0;
  }

  // Copy tmp to f
  f.set(fTmp);

  stepCount++;
}

function getOmegaFromRe() {
  // tau = 3 * nu + 0.5, nu = u0 * L / Re
  const u0 = 0.1, L = CYL_R * 2;
  const nu = u0 * L / Re;
  return 3 * nu + 0.5;
}

function computeVorticity(x, y) {
  // ∂uy/∂x - ∂ux/∂y (finite difference)
  const xm = Math.max(0, x - 1), xp = Math.min(NX - 1, x + 1);
  const ym = Math.max(0, y - 1), yp = Math.min(NY - 1, y + 1);
  const dvx = (uy[y * NX + xp] - uy[y * NX + xm]) / (xp - xm);
  const duy = (ux[yp * NX + x] - ux[ym * NX + x]) / (yp - ym);
  return dvx - duy;
}

function updateTracers() {
  trailHead = (trailHead + 1) % TRAIL_LEN;
  for (let i = 0; i < NUM_TRACERS; i++) {
    const xi = Math.floor(tracerX[i]), yi = Math.floor(tracerY[i]);
    if (xi < 0 || xi >= NX || yi < 0 || yi >= NY || obstacle[yi * NX + xi]) {
      resetTracer(i);
    }
    const ci = yi * NX + xi;
    tracerX[i] += ux[ci] * 2.5;
    tracerY[i] += uy[ci] * 2.5;
    if (tracerX[i] >= NX) resetTracer(i);
    if (tracerY[i] < 0) tracerY[i] += NY;
    if (tracerY[i] >= NY) tracerY[i] -= NY;
    trailX[i][trailHead] = tracerX[i];
    trailY[i][trailHead] = tracerY[i];
  }
}

let imgData = null;

function render() {
  if (!imgData || imgData.width !== W || imgData.height !== H) {
    imgData = ctx.createImageData(W, H);
  }
  const data = imgData.data;
  const scaleX = W / NX, scaleY = H / NY;

  // Compute range for normalization
  let minV = Infinity, maxV = -Infinity;
  for (let y = 1; y < NY - 1; y++) {
    for (let x = 1; x < NX - 1; x++) {
      const i = y * NX + x;
      if (obstacle[i]) continue;
      let val;
      if (vizMode === 'vort') val = computeVorticity(x, y);
      else if (vizMode === 'speed') val = Math.sqrt(ux[i] * ux[i] + uy[i] * uy[i]);
      else val = rho[i];
      if (val < minV) minV = val;
      if (val > maxV) maxV = val;
    }
  }
  const range = maxV - minV || 1;

  for (let y = 0; y < NY; y++) {
    for (let x = 0; x < NX; x++) {
      const i = y * NX + x;
      const px = Math.floor(x * scaleX);
      const py = Math.floor(y * scaleY);
      const pw2 = Math.ceil(scaleX) + 1;
      const ph2 = Math.ceil(scaleY) + 1;

      let r, g, bv;
      if (obstacle[i]) {
        r = 40; g = 40; bv = 50;
      } else {
        let val;
        if (vizMode === 'vort') {
          const vort = computeVorticity(x, y);
          const t2 = (vort - minV) / range;
          // Negative vorticity=blue, zero=black, positive=red
          if (t2 < 0.5) {
            const s = t2 / 0.5;
            r = 0; g = 0; bv = Math.floor(s * 220);
          } else {
            const s = (t2 - 0.5) / 0.5;
            r = Math.floor(s * 220); g = 0; bv = 0;
          }
        } else if (vizMode === 'speed') {
          const speed = Math.sqrt(ux[i] * ux[i] + uy[i] * uy[i]);
          const t2 = Math.min(1, (speed - minV) / range);
          // dark → cyan gradient
          r = 0; g = Math.floor(t2 * 200); bv = Math.floor(t2 * 220);
        } else {
          // pressure / density
          const t2 = (rho[i] - minV) / range;
          r = Math.floor(t2 * 200); g = Math.floor(t2 * 100); bv = Math.floor(t2 * 50);
        }
      }

      for (let ry = py; ry < py + ph2 && ry < H; ry++) {
        for (let rx = px; rx < px + pw2 && rx < W; rx++) {
          const idx = (ry * W + rx) * 4;
          data[idx] = r; data[idx+1] = g; data[idx+2] = bv; data[idx+3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imgData, 0, 0);

  // Draw tracers
  for (let i = 0; i < NUM_TRACERS; i++) {
    ctx.beginPath();
    for (let t2 = 0; t2 < TRAIL_LEN; t2++) {
      const ti = (trailHead - t2 + TRAIL_LEN) % TRAIL_LEN;
      const tx2 = trailX[i][ti] * scaleX;
      const ty2 = trailY[i][ti] * scaleY;
      const alpha = (1 - t2 / TRAIL_LEN) * 0.7;
      if (t2 === 0) {
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(tx2, ty2);
      } else {
        const ti2 = (trailHead - t2 + 1 + TRAIL_LEN) % TRAIL_LEN;
        ctx.lineTo(trailX[i][ti] * scaleX, trailY[i][ti] * scaleY);
      }
    }
    ctx.strokeStyle = 'rgba(200,230,255,0.35)';
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  // Draw cylinder outline
  const cylX = CYL_X * scaleX, cylY = CYL_Y * scaleY;
  const cylR = CYL_R * Math.min(scaleX, scaleY);
  ctx.beginPath();
  ctx.arc(cylX, cylY, cylR, 0, Math.PI * 2);
  ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = 'rgba(30,30,40,0.8)';
  ctx.fill();

  // Stats
  document.getElementById('step-val').textContent = stepCount;

  // Kármán vortex street label
  const karman = document.getElementById('karman-label');
  karman.style.opacity = (Re >= 80 && stepCount > 200) ? '1' : '0';
}

function setViz(mode) {
  vizMode = mode;
  ['vort','speed','press'].forEach(m => {
    document.getElementById('btn-' + m).classList.toggle('active', m === mode);
  });
}

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  imgData = null;
}

document.getElementById('re-slider').addEventListener('input', function() {
  Re = parseInt(this.value);
  document.getElementById('re-val').textContent = Re;
});

let lastTime = 0;
function loop(ts) {
  const elapsed = ts - lastTime;
  if (elapsed > 16) { // ~60fps cap
    lastTime = ts;
    for (let s = 0; s < 3; s++) stepLBM();
    updateTracers();
    render();
  }
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize);
resize();
setupObstacle();
resetLBM();
requestAnimationFrame(loop);
</script>
</body>
</html>
