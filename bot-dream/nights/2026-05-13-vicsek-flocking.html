<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vicsek 模型 — 椋鸟群舞</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #header {
    flex-shrink: 0;
    padding: 8px 16px;
    background: inherit;
    border-bottom: 1px solid #1a2a3a;
  }
  h1 {
    font-size: 1.3rem;
    font-weight: 400;
    color: #aad4f5;
    margin-bottom: 2px;
    letter-spacing: 0.05em;
  }
  .subtitle {
    font-size: 0.72rem;
    color: #556;
    letter-spacing: 0.08em;
  }
  .main-layout {
    flex: 1;
    display: flex;
    gap: 16px;
    padding: 12px;
    overflow: hidden;
    align-items: stretch;
    min-height: 0;
  }
  .canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    align-items: center;
    justify-content: center;
  }
  canvas#main {
    border: 1px solid #1a2a3a;
    border-radius: 4px;
    background: #03050a;
    display: block;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 1;
    flex-shrink: 1;
  }
  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 260px;
  }
  .panel-box {
    background: #0e1420;
    border: 1px solid #1c2a3a;
    border-radius: 6px;
    padding: 12px;
  }
  .panel-box h3 {
    font-size: 0.68rem;
    color: #5588aa;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 8px;
  }
  .phi-display {
    font-size: 2.4rem;
    font-weight: 300;
    color: #7de0a0;
    text-align: center;
    line-height: 1;
    margin: 6px 0;
  }
  .phi-label {
    font-size: 0.65rem;
    color: #445;
    text-align: center;
    margin-bottom: 4px;
  }
  canvas#phiChart {
    width: 100%;
    height: 80px;
    display: block;
  }
  canvas#roseChart {
    width: 100%;
    height: 120px;
    display: block;
  }
  .controls {
    background: #0e1420;
    border: 1px solid #1c2a3a;
    border-radius: 6px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 260px;
  }
  .ctrl-row {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .ctrl-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.68rem;
    color: #8ab;
  }
  .ctrl-label span.val {
    color: #ddd;
    font-size: 0.72rem;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: #1a2a3a;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #4a9edd;
    cursor: pointer;
  }
  .eta-track {
    position: relative;
    margin-top: 2px;
  }
  .eta-marker {
    position: absolute;
    top: -14px;
    font-size: 0.55rem;
    color: #f0a040;
    transform: translateX(-50%);
    pointer-events: none;
  }
  .eta-marker::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 14px;
    width: 1px;
    height: 8px;
    background: #f0a040;
    transform: translateX(-50%);
  }
  .btn-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  button {
    background: #152030;
    border: 1px solid #2a4060;
    color: #9bc;
    font-family: inherit;
    font-size: 0.68rem;
    padding: 5px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  button:hover { background: #1e3050; border-color: #4a80b0; color: #cde; }
  button.active { background: #1a4060; border-color: #4a9edd; color: #7dd0ff; }
  .preset-btn {
    flex: 1;
    min-width: 70px;
  }
  .toggle-check {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    color: #8ab;
    cursor: pointer;
  }
  .toggle-check input[type=checkbox] {
    accent-color: #4a9edd;
    width: 13px;
    height: 13px;
    cursor: pointer;
  }
  .phase-info {
    font-size: 0.62rem;
    color: #5577aa;
    line-height: 1.5;
    margin-top: 4px;
  }
  .step-count {
    font-size: 0.62rem;
    color: #445566;
    text-align: right;
  }
</style>
</head>
<body>
<div id="header">
  <h1>Vicsek 模型 — 椋鸟群舞</h1>
  <div class="subtitle">Vicsek et al. 1995 · 粒子方向对齐 · 涌现相变</div>
</div>

<div class="main-layout">
  <div class="canvas-area">
    <canvas id="main"></canvas>
    <div class="step-count" id="stepCount">step: 0</div>
  </div>

  <div style="display:flex;flex-direction:column;gap:12px;">
    <div class="side-panel">
      <!-- Phi display -->
      <div class="panel-box">
        <h3>序参数 Φ（速度对齐度）</h3>
        <div class="phi-display" id="phiVal">0.00</div>
        <div class="phi-label">Φ = 0 (混沌) ↔ 1 (完全对齐)</div>
        <canvas id="phiChart" width="236" height="80"></canvas>
      </div>

      <!-- Rose chart -->
      <div class="panel-box">
        <h3>速度方向分布</h3>
        <canvas id="roseChart" width="236" height="120"></canvas>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div style="font-size:0.7rem;color:#5588aa;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px;">控制参数</div>

      <div class="ctrl-row">
        <div class="ctrl-label">
          <span>噪声强度 η <span style="color:#f0a040;font-size:0.6rem;">← 最关键参数</span></span>
          <span class="val" id="etaVal">0.20</span>
        </div>
        <div class="eta-track">
          <div class="eta-marker" id="etaMarker" style="left:20%">η_c≈0.2</div>
          <input type="range" id="etaSlider" min="0" max="1" step="0.01" value="0.2">
        </div>
      </div>

      <div class="ctrl-row">
        <div class="ctrl-label"><span>粒子数 N</span><span class="val" id="nVal">400</span></div>
        <input type="range" id="nSlider" min="100" max="800" step="50" value="400">
      </div>

      <div class="ctrl-row">
        <div class="ctrl-label"><span>速度 v₀</span><span class="val" id="v0Val">0.10</span></div>
        <input type="range" id="v0Slider" min="0.05" max="0.2" step="0.01" value="0.1">
      </div>

      <div class="ctrl-row">
        <div class="ctrl-label"><span>邻域半径 R</span><span class="val" id="rVal">1.00</span></div>
        <input type="range" id="rSlider" min="0.5" max="3.0" step="0.1" value="1.0">
      </div>

      <div class="ctrl-row">
        <div class="ctrl-label"><span>密度 ρ = N/L²</span><span class="val" id="rhoVal">1.00</span></div>
        <div style="font-size:0.6rem;color:#445566;">（调 N 和 L，当前 L = <span id="lVal">20</span>）</div>
      </div>

      <label class="toggle-check">
        <input type="checkbox" id="showNeighbors"> 显示邻域圆（R 圆）
      </label>

      <div class="btn-row">
        <button id="pauseBtn">暂停</button>
        <button id="resetBtn">重置</button>
      </div>

      <div style="font-size:0.68rem;color:#5588aa;margin-top:2px;">预设场景</div>
      <div class="btn-row">
        <button class="preset-btn" id="presetOrder">有序<br><span style="font-size:0.6rem;color:#556">η=0.05</span></button>
        <button class="preset-btn" id="presetCritical">临界<br><span style="font-size:0.6rem;color:#f0a040">η=0.2</span></button>
        <button class="preset-btn" id="presetChaos">混沌<br><span style="font-size:0.6rem;color:#556">η=0.6</span></button>
      </div>

      <div class="phase-info" id="phaseInfo">
        临界点附近（η≈0.2）：有序与无序共存，涌现集体运动
      </div>
    </div>
  </div>
</div>

<script>
// ─── Parameters ───────────────────────────────────────────────────────────────
let N = 400;
let v0 = 0.1;
let R = 1.0;
let eta = 0.2;
let L = 20;
let showNeighbors = false;
let paused = false;
let step = 0;

// ─── State ────────────────────────────────────────────────────────────────────
let x, y, theta;
const phiHistory = new Array(300).fill(0);
let phiPtr = 0;

function initParticles() {
  x = new Float32Array(N);
  y = new Float32Array(N);
  theta = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    x[i] = Math.random() * L;
    y[i] = Math.random() * L;
    theta[i] = (Math.random() * 2 - 1) * Math.PI;
  }
  phiHistory.fill(0);
  phiPtr = 0;
  step = 0;
}

// ─── Simulation step ─────────────────────────────────────────────────────────
function simulate() {
  const R2 = R * R;
  const newTheta = new Float32Array(N);

  for (let i = 0; i < N; i++) {
    let sumSin = Math.sin(theta[i]);
    let sumCos = Math.cos(theta[i]);
    let count = 1;

    const xi = x[i], yi = y[i];

    for (let j = 0; j < N; j++) {
      if (i === j) continue;
      let dx = x[j] - xi;
      let dy = y[j] - yi;
      // periodic
      if (dx > L/2) dx -= L;
      else if (dx < -L/2) dx += L;
      if (dy > L/2) dy -= L;
      else if (dy < -L/2) dy += L;

      if (dx*dx + dy*dy < R2) {
        sumSin += Math.sin(theta[j]);
        sumCos += Math.cos(theta[j]);
        count++;
      }
    }

    const avgAngle = Math.atan2(sumSin, sumCos);
    const noise = (Math.random() * 2 - 1) * Math.PI * eta;
    newTheta[i] = avgAngle + noise;
  }

  // Update positions
  for (let i = 0; i < N; i++) {
    theta[i] = newTheta[i];
    x[i] += v0 * Math.cos(theta[i]);
    y[i] += v0 * Math.sin(theta[i]);
    // periodic boundary
    if (x[i] < 0) x[i] += L;
    else if (x[i] >= L) x[i] -= L;
    if (y[i] < 0) y[i] += L;
    else if (y[i] >= L) y[i] -= L;
  }

  // Compute order parameter
  let sx = 0, sy = 0;
  for (let i = 0; i < N; i++) {
    sx += Math.cos(theta[i]);
    sy += Math.sin(theta[i]);
  }
  const phi = Math.sqrt(sx*sx + sy*sy) / N;
  phiHistory[phiPtr % 300] = phi;
  phiPtr++;
  step++;
  return phi;
}

// ─── Canvas rendering ─────────────────────────────────────────────────────────
const mainCanvas = document.getElementById('main');
const ctx = mainCanvas.getContext('2d');
let W = mainCanvas.width;
let H = mainCanvas.height;

function resizeMain() {
  const area = document.querySelector('.canvas-area');
  const size = Math.min(area.clientWidth, area.clientHeight);
  mainCanvas.width = size;
  mainCanvas.height = size;
  W = mainCanvas.width;
  H = mainCanvas.height;
  L = Math.sqrt(N / 1.0);
}
window.addEventListener('resize', resizeMain);

const phiCanvas = document.getElementById('phiChart');
const pctx = phiCanvas.getContext('2d');

const roseCanvas = document.getElementById('roseChart');
const rctx = roseCanvas.getContext('2d');

function angleToColor(angle) {
  // angle in [-pi, pi] -> hue [0, 360]
  const hue = ((angle + Math.PI) / (2 * Math.PI) * 360) | 0;
  return `hsl(${hue},90%,60%)`;
}

function drawMain() {
  const scale = W / L;

  ctx.fillStyle = '#03050a';
  ctx.fillRect(0, 0, W, H);

  // Draw grid lines faintly
  ctx.strokeStyle = 'rgba(30,50,70,0.3)';
  ctx.lineWidth = 0.5;
  for (let g = 0; g <= L; g += 5) {
    const p = g * scale;
    ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(W, p); ctx.stroke();
  }

  // Neighbor circles (only for first 10 particles to avoid clutter)
  if (showNeighbors) {
    ctx.globalAlpha = 0.04;
    ctx.fillStyle = '#4488bb';
    for (let i = 0; i < Math.min(N, 15); i++) {
      const px = x[i] * scale;
      const py = y[i] * scale;
      ctx.beginPath();
      ctx.arc(px, py, R * scale, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 0.12;
    ctx.strokeStyle = '#4488bb';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < Math.min(N, 15); i++) {
      const px = x[i] * scale;
      const py = y[i] * scale;
      ctx.beginPath();
      ctx.arc(px, py, R * scale, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Arrows
  const arrowLen = Math.max(4, scale * 0.35);
  const arrowW = arrowLen * 0.32;

  for (let i = 0; i < N; i++) {
    const px = x[i] * scale;
    const py = y[i] * scale;
    const t = theta[i];
    const color = angleToColor(t);

    const cos = Math.cos(t), sin = Math.sin(t);
    const tx = cos * arrowLen, ty = sin * arrowLen;
    const nx = -sin * arrowW, ny = cos * arrowW;

    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 3;
    ctx.beginPath();
    ctx.moveTo(px + tx, py + ty);
    ctx.lineTo(px - tx * 0.5 + nx, py - ty * 0.5 + ny);
    ctx.lineTo(px - tx * 0.5 - nx, py - ty * 0.5 - ny);
    ctx.closePath();
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function drawPhiChart(phi) {
  const cw = phiCanvas.width, ch = phiCanvas.height;
  pctx.fillStyle = '#080e18';
  pctx.fillRect(0, 0, cw, ch);

  // grid
  pctx.strokeStyle = '#1a2a3a';
  pctx.lineWidth = 1;
  for (let v = 0; v <= 1; v += 0.25) {
    const yp = ch - v * ch;
    pctx.beginPath(); pctx.moveTo(0, yp); pctx.lineTo(cw, yp); pctx.stroke();
  }

  // Phi line
  const len = Math.min(phiPtr, 300);
  if (len < 2) return;
  pctx.strokeStyle = '#3dc87a';
  pctx.lineWidth = 1.5;
  pctx.beginPath();
  for (let k = 0; k < len; k++) {
    const idx = (phiPtr - len + k) % 300;
    const xp = k / 299 * cw;
    const yp = ch - phiHistory[idx] * ch;
    if (k === 0) pctx.moveTo(xp, yp);
    else pctx.lineTo(xp, yp);
  }
  pctx.stroke();

  // Current phi marker
  pctx.fillStyle = '#7de0a0';
  pctx.beginPath();
  const lastIdx = (phiPtr - 1 + 300) % 300;
  pctx.arc(cw - 2, ch - phiHistory[lastIdx] * ch, 3, 0, Math.PI*2);
  pctx.fill();
}

function drawRose() {
  const cw = roseCanvas.width, ch = roseCanvas.height;
  rctx.fillStyle = '#080e18';
  rctx.fillRect(0, 0, cw, ch);

  const cx = cw / 2, cy = ch / 2;
  const maxR = Math.min(cx, cy) - 4;
  const bins = 36;
  const counts = new Int32Array(bins);
  for (let i = 0; i < N; i++) {
    const b = Math.floor(((theta[i] + Math.PI) / (2 * Math.PI)) * bins) % bins;
    counts[b]++;
  }
  const maxCount = Math.max(...counts, 1);

  rctx.lineWidth = 0.5;
  for (let b = 0; b < bins; b++) {
    const angle = (b / bins) * Math.PI * 2 - Math.PI;
    const r = (counts[b] / maxCount) * maxR;
    const hue = (b / bins * 360) | 0;
    rctx.fillStyle = `hsla(${hue},90%,60%,0.7)`;
    rctx.strokeStyle = `hsla(${hue},90%,80%,0.9)`;
    rctx.beginPath();
    rctx.moveTo(cx, cy);
    const a1 = angle - Math.PI / bins;
    const a2 = angle + Math.PI / bins;
    rctx.arc(cx, cy, r, a1, a2);
    rctx.closePath();
    rctx.fill();
    rctx.stroke();
  }

  // circles
  rctx.strokeStyle = 'rgba(40,60,80,0.5)';
  rctx.lineWidth = 0.5;
  for (let r = maxR * 0.33; r <= maxR; r += maxR * 0.33) {
    rctx.beginPath();
    rctx.arc(cx, cy, r, 0, Math.PI * 2);
    rctx.stroke();
  }

  // axes
  rctx.strokeStyle = 'rgba(80,120,160,0.3)';
  for (let a = 0; a < 4; a++) {
    const angle = a * Math.PI / 2;
    rctx.beginPath();
    rctx.moveTo(cx, cy);
    rctx.lineTo(cx + Math.cos(angle) * maxR, cy + Math.sin(angle) * maxR);
    rctx.stroke();
  }
}

// ─── UI Controls ──────────────────────────────────────────────────────────────
function updateL() {
  L = Math.sqrt(N / 1.0); // keep rho ≈ 1 by default, but allow custom
  document.getElementById('lVal').textContent = L.toFixed(1);
  document.getElementById('rhoVal').textContent = (N / (L * L)).toFixed(2);
}

document.getElementById('etaSlider').addEventListener('input', function() {
  eta = parseFloat(this.value);
  document.getElementById('etaVal').textContent = eta.toFixed(2);
  updatePhaseInfo();
});
document.getElementById('nSlider').addEventListener('input', function() {
  N = parseInt(this.value);
  document.getElementById('nVal').textContent = N;
  updateL();
  initParticles();
});
document.getElementById('v0Slider').addEventListener('input', function() {
  v0 = parseFloat(this.value);
  document.getElementById('v0Val').textContent = v0.toFixed(2);
});
document.getElementById('rSlider').addEventListener('input', function() {
  R = parseFloat(this.value);
  document.getElementById('rVal').textContent = R.toFixed(2);
});
document.getElementById('showNeighbors').addEventListener('change', function() {
  showNeighbors = this.checked;
});
document.getElementById('pauseBtn').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? '继续' : '暂停';
  this.classList.toggle('active', paused);
});
document.getElementById('resetBtn').addEventListener('click', function() {
  initParticles();
});

function setPreset(e, n_val, v0_val, r_val) {
  eta = e;
  document.getElementById('etaSlider').value = e;
  document.getElementById('etaVal').textContent = e.toFixed(2);
  v0 = v0_val;
  document.getElementById('v0Slider').value = v0_val;
  document.getElementById('v0Val').textContent = v0_val.toFixed(2);
  R = r_val;
  document.getElementById('rSlider').value = r_val;
  document.getElementById('rVal').textContent = r_val.toFixed(2);
  updatePhaseInfo();
  initParticles();
}

document.getElementById('presetOrder').addEventListener('click', () => setPreset(0.05, 0.1, 1.0));
document.getElementById('presetCritical').addEventListener('click', () => setPreset(0.2, 0.1, 1.0));
document.getElementById('presetChaos').addEventListener('click', () => setPreset(0.6, 0.1, 1.0));

function updatePhaseInfo() {
  const el = document.getElementById('phaseInfo');
  if (eta < 0.1) {
    el.textContent = '低噪声区（η<0.1）：粒子迅速对齐，形成集体运动，Φ→1';
    el.style.color = '#3dc87a';
  } else if (eta < 0.3) {
    el.textContent = '临界区（η≈0.2）：秩序-无序相变边界，涌现大尺度集体运动';
    el.style.color = '#f0a040';
  } else {
    el.textContent = '高噪声区（η>0.3）：方向随机化，粒子各自乱飞，Φ→0';
    el.style.color = '#e05050';
  }
}

// ─── Main loop ────────────────────────────────────────────────────────────────
resizeMain();
initParticles();
updateL();
updatePhaseInfo();

// Substepping for performance
let lastTime = 0;
const TARGET_FPS = 30;

function loop(timestamp) {
  if (!paused) {
    const stepsPerFrame = N > 500 ? 1 : 2;
    let lastPhi = 0;
    for (let s = 0; s < stepsPerFrame; s++) {
      lastPhi = simulate();
    }

    drawMain();
    drawPhiChart(lastPhi);
    drawRose();

    document.getElementById('phiVal').textContent = lastPhi.toFixed(3);
    document.getElementById('stepCount').textContent = `step: ${step}`;
    document.getElementById('rhoVal').textContent = (N / (L * L)).toFixed(2);
  } else {
    drawMain();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
