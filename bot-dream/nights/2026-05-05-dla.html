<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 8 · DLA 分形生长</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }

#label {
  position: absolute; top: 12px; left: 14px; z-index: 10;
  font-size: 11px; color: #888; line-height: 1.6; pointer-events: none;
}

#stats {
  position: absolute; top: 12px; right: 14px; z-index: 10;
  background: rgba(0,0,0,0.75); padding: 12px; border: 1px solid #333;
  display: flex; flex-direction: column; gap: 8px; min-width: 180px;
}
.stat-line { font-size: 12px; color: #aaa; }
.stat-line span { color: #ffd580; }

#controls {
  position: absolute; bottom: 60px; right: 14px; z-index: 10;
  background: rgba(0,0,0,0.75); padding: 10px; border: 1px solid #333;
  display: flex; flex-direction: column; gap: 8px;
}
.ctrl-row { display: flex; flex-direction: column; gap: 3px; }
.ctrl-row label { font-size: 11px; color: #aaa; }
button {
  background: #1a1a1a; border: 1px solid #444; color: #ffd580;
  padding: 6px 14px; cursor: pointer; font-family: 'Courier New', monospace;
  font-size: 11px;
}
button:hover { background: #2a2a2a; }

#caption {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: #666; text-align: center; max-width: 700px;
  line-height: 1.7; pointer-events: none; font-family: sans-serif; z-index: 10;
}

canvas { display: block; }
</style>
</head>
<body>

<div id="label">
  <a href="../../" style="color:#555;text-decoration:none;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:8px;">← 问野 / ROAM</a>
    Night 08 · 2026-05-05<br>DLA · 分形生长
</div>

<div id="stats">
  <div class="stat-line">粒子数: <span id="count">1</span></div>
  <div class="stat-line">分形维度: <span id="fdim">—</span></div>
  <div class="stat-line">最大半径: <span id="maxr">0</span></div>
</div>

<div id="controls">
  <div class="ctrl-row">
    <label>游走步长 <span id="step-val">1</span></label>
    <input type="range" id="step-slider" min="1" max="3" step="1" value="1" style="width:140px; accent-color:#ffd580;">
  </div>
  <button id="reset-btn">重新生长</button>
</div>

<canvas id="main"></canvas>

<div id="caption">「每个粒子从边缘随机游走，碰到现有结构就停下来。分形维度约1.71——不是整数。闪电路径、雪花生长、珊瑚分支，都有同样的数学指纹。」</div>

<script>
const SIZE = Math.min(window.innerWidth, window.innerHeight - 80);
const canvas = document.getElementById('main');
canvas.width = SIZE;
canvas.height = SIZE;
const ctx = canvas.getContext('2d');

const GRID = 600;
const scale = SIZE / GRID;
const cx = GRID / 2, cy = GRID / 2;

let grid = new Uint8Array(GRID * GRID); // 0=empty, 1=cluster
let particleCount = 0;
let maxRadius = 1;
let stepSize = 1;

// Walkers
const NUM_WALKERS = 200;
let walkers = [];

// Color by attachment time: early=amber (#f59e0b), late=cyan (#67e8f9)
let attachColors = [];

function timeColor(t, total) {
  // t in [0,1], amber → white → cyan
  const r1 = 245, g1 = 158, b1 = 11;  // amber
  const r2 = 103, g2 = 232, b2 = 249; // cyan
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return `rgb(${r},${g},${b})`;
}

let imageData, pixData;

function resetCanvas() {
  imageData = ctx.createImageData(SIZE, SIZE);
  pixData = imageData.data;
  // Fill black
  for (let i = 0; i < pixData.length; i += 4) {
    pixData[i] = 0; pixData[i+1] = 0; pixData[i+2] = 0; pixData[i+3] = 255;
  }
}

function setPixel(gx, gy, r, g, b) {
  const px0 = Math.floor(gx * scale);
  const py0 = Math.floor(gy * scale);
  const px1 = Math.floor((gx + 1) * scale);
  const py1 = Math.floor((gy + 1) * scale);
  for (let py = py0; py < py1; py++) {
    for (let px = px0; px < px1; px++) {
      const off = (py * SIZE + px) * 4;
      pixData[off] = r; pixData[off+1] = g; pixData[off+2] = b; pixData[off+3] = 255;
    }
  }
}

function gridIdx(x, y) { return y * GRID + x; }

function isNeighborCluster(x, y) {
  if (grid[gridIdx(x+1, y)] || grid[gridIdx(x-1, y)] ||
      grid[gridIdx(x, y+1)] || grid[gridIdx(x, y-1)]) return true;
  return false;
}

function spawnWalker() {
  // Spawn on circle slightly outside maxRadius
  const spawnR = Math.min(maxRadius + 5, GRID / 2 - 2);
  const angle = Math.random() * Math.PI * 2;
  return {
    x: Math.round(cx + spawnR * Math.cos(angle)),
    y: Math.round(cy + spawnR * Math.sin(angle))
  };
}

function initDLA() {
  grid = new Uint8Array(GRID * GRID);
  particleCount = 0;
  maxRadius = 1;
  walkers = [];
  attachColors = [];
  resetCanvas();

  // Seed at center
  grid[gridIdx(cx, cy)] = 1;
  particleCount = 1;
  setPixel(cx, cy, 245, 200, 80);

  // Spawn walkers
  for (let i = 0; i < NUM_WALKERS; i++) {
    walkers.push(spawnWalker());
  }
}

// Fractal dimension estimate: log(mass) / log(radius)
let massSamples = [];
function updateFractalDim() {
  if (particleCount < 10) return;
  massSamples.push({ r: maxRadius, m: particleCount });
  if (massSamples.length > 50) massSamples.shift();
  if (massSamples.length < 5) return;

  // Log-log linear regression
  let sumx = 0, sumy = 0, sumxy = 0, sumx2 = 0, n = massSamples.length;
  for (const s of massSamples) {
    const lx = Math.log(s.r), ly = Math.log(s.m);
    sumx += lx; sumy += ly; sumxy += lx * ly; sumx2 += lx * lx;
  }
  const slope = (n * sumxy - sumx * sumy) / (n * sumx2 - sumx * sumx);
  document.getElementById('fdim').textContent = slope.toFixed(3);
}

let frameCount = 0;
function step() {
  const STEPS_PER_FRAME = 50;

  for (let s = 0; s < STEPS_PER_FRAME; s++) {
    for (let wi = 0; wi < walkers.length; wi++) {
      const w = walkers[wi];
      // Random walk
      const dir = (Math.random() * 4) | 0;
      if (dir === 0) w.x += stepSize;
      else if (dir === 1) w.x -= stepSize;
      else if (dir === 2) w.y += stepSize;
      else w.y -= stepSize;

      // Boundary: restart if too far
      const dx = w.x - cx, dy = w.y - cy;
      const r = Math.sqrt(dx * dx + dy * dy);
      if (r > maxRadius + 12 || w.x < 1 || w.x >= GRID - 1 || w.y < 1 || w.y >= GRID - 1) {
        walkers[wi] = spawnWalker();
        continue;
      }

      // Check attachment
      if (grid[gridIdx(w.x, w.y)] === 0 && isNeighborCluster(w.x, w.y)) {
        grid[gridIdx(w.x, w.y)] = 1;
        particleCount++;

        const dr = Math.sqrt(dx * dx + dy * dy);
        if (dr > maxRadius) maxRadius = dr;

        // Color: time fraction → amber to cyan
        const t = Math.min(particleCount / 8000, 1);
        const r0 = 245, g0 = 158, b0 = 11;
        const r1 = 103, g1 = 232, b1 = 249;
        const rr = Math.round(r0 + (r1 - r0) * t);
        const gg = Math.round(g0 + (g1 - g0) * t);
        const bb = Math.round(b0 + (b1 - b0) * t);
        setPixel(w.x, w.y, rr, gg, bb);

        // Glow effect: neighbors get faint tint
        for (const [nx, ny] of [[w.x+1,w.y],[w.x-1,w.y],[w.x,w.y+1],[w.x,w.y-1]]) {
          if (nx > 0 && nx < GRID-1 && ny > 0 && ny < GRID-1 && grid[gridIdx(nx,ny)] === 0) {
            const off = (Math.floor(ny * scale) * SIZE + Math.floor(nx * scale)) * 4;
            pixData[off] = Math.min(pixData[off] + 15, 255);
            pixData[off+1] = Math.min(pixData[off+1] + 10, 255);
            pixData[off+2] = Math.min(pixData[off+2] + 5, 255);
          }
        }

        walkers[wi] = spawnWalker();
      }
    }
  }

  ctx.putImageData(imageData, 0, 0);
  frameCount++;

  if (frameCount % 10 === 0) {
    document.getElementById('count').textContent = particleCount;
    document.getElementById('maxr').textContent = Math.round(maxRadius);
    if (particleCount % 100 < STEPS_PER_FRAME) updateFractalDim();
  }

  requestAnimationFrame(step);
}

document.getElementById('step-slider').addEventListener('input', function() {
  stepSize = parseInt(this.value);
  document.getElementById('step-val').textContent = stepSize;
});
document.getElementById('reset-btn').addEventListener('click', initDLA);

initDLA();
step();
</script>
</body>
</html>
