<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 7 · 伊辛模型</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }

#label {
  position: absolute; top: 12px; left: 14px; z-index: 10;
  font-size: 11px; color: #888; line-height: 1.6;
  pointer-events: none;
}

#controls {
  position: absolute; top: 12px; right: 14px; z-index: 10;
  display: flex; flex-direction: column; gap: 10px;
  background: rgba(0,0,0,0.7); padding: 12px; border: 1px solid #333;
  min-width: 220px;
}
.ctrl-row { display: flex; flex-direction: column; gap: 4px; }
.ctrl-row label { font-size: 11px; color: #aaa; }
.ctrl-row input[type=range] { width: 100%; accent-color: #f5a524; }
.ctrl-marks { display: flex; justify-content: space-between; font-size: 9px; color: #666; }
.stat { font-size: 12px; color: #f5a524; }
.stat span { color: #fff; }
.tc-label { font-size: 10px; color: #888; border-top: 1px solid #333; padding-top: 6px; }

#caption {
  position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: #666; text-align: center; max-width: 700px;
  line-height: 1.7; pointer-events: none; font-family: sans-serif;
  z-index: 10;
}

canvas { display: block; }
#graph-canvas { position: absolute; bottom: 60px; right: 14px; border: 1px solid #333; }
</style>
</head>
<body>

<div id="label">
  <a href="../../" style="color:#555;text-decoration:none;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;display:block;margin-bottom:8px;">← 问野 / ROAM</a>
    Night 07 · 2026-05-04<br>伊辛模型 · 相变
</div>

<div id="controls">
  <div class="ctrl-row">
    <label>温度 T = <span id="t-val">2.269</span></label>
    <input type="range" id="temp-slider" min="0.5" max="5.0" step="0.01" value="2.269">
    <div class="ctrl-marks"><span>低温</span><span>居里点</span><span>高温</span></div>
  </div>
  <div class="ctrl-row">
    <label>速度 = <span id="sp-val">5</span></label>
    <input type="range" id="speed-slider" min="1" max="20" step="1" value="5">
  </div>
  <div class="stat">M = <span id="mag-val">0.000</span></div>
  <div class="stat">T = <span id="t-disp">2.269</span></div>
  <div class="tc-label">临界温度 Tc = 2.269</div>
</div>

<canvas id="main"></canvas>
<canvas id="graph-canvas" width="220" height="120"></canvas>

<div id="caption">「铁磁材料在居里点会失去磁性。恰好在那个临界温度，金色（朝上）和黑色（朝下）的原子团以所有尺度同时共存——这是"临界态"，物质最优雅也最脆弱的时刻。」</div>

<script>
const N = 200;
const canvas = document.getElementById('main');
const ctx = canvas.getContext('2d');
const gCanvas = document.getElementById('graph-canvas');
const gCtx = gCanvas.getContext('2d');

let W, H, cellW, cellH;
let spins = new Int8Array(N * N);
let T = 2.269;
let speed = 5;
let magnetization = 0;
let graphPoints = []; // {t, m}
const GOLD = '#f5a524';
const DARK = '#111111';

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  cellW = W / N;
  cellH = H / N;
}

function initSpins() {
  // Start ordered (cold) or random?
  for (let i = 0; i < N * N; i++) {
    spins[i] = Math.random() < 0.5 ? 1 : -1;
  }
}

function idx(x, y) {
  return ((y + N) % N) * N + ((x + N) % N);
}

function metropolisStep(steps) {
  const beta = 1.0 / T;
  for (let s = 0; s < steps; s++) {
    const x = (Math.random() * N) | 0;
    const y = (Math.random() * N) | 0;
    const i = y * N + x;
    const si = spins[i];
    const neighbors = spins[idx(x+1,y)] + spins[idx(x-1,y)] + spins[idx(x,y+1)] + spins[idx(x,y-1)];
    const dE = 2 * si * neighbors;
    if (dE <= 0 || Math.random() < Math.exp(-beta * dE)) {
      spins[i] = -si;
    }
  }
}

function computeMagnetization() {
  let sum = 0;
  for (let i = 0; i < N * N; i++) sum += spins[i];
  return sum / (N * N);
}

let imageData;
function initImageData() {
  imageData = ctx.createImageData(W, H);
}

function drawSpins() {
  const data = imageData.data;
  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      const spin = spins[y * N + x];
      // Map grid cell to pixels
      const px0 = Math.floor(x * cellW);
      const px1 = Math.floor((x + 1) * cellW);
      const py0 = Math.floor(y * cellH);
      const py1 = Math.floor((y + 1) * cellH);
      const r = spin === 1 ? 245 : 17;
      const g = spin === 1 ? 165 : 17;
      const b = spin === 1 ? 36 : 17;
      for (let py = py0; py < py1; py++) {
        for (let px = px0; px < px1; px++) {
          const off = (py * W + px) * 4;
          data[off] = r; data[off+1] = g; data[off+2] = b; data[off+3] = 255;
        }
      }
    }
  }
  ctx.putImageData(imageData, 0, 0);
}

function drawGraph() {
  const gw = gCanvas.width, gh = gCanvas.height;
  gCtx.fillStyle = 'rgba(0,0,0,0.9)';
  gCtx.fillRect(0, 0, gw, gh);
  gCtx.strokeStyle = '#333';
  gCtx.lineWidth = 1;
  gCtx.strokeRect(0, 0, gw, gh);

  // Axes
  gCtx.fillStyle = '#555';
  gCtx.font = '9px Courier New';
  gCtx.fillText('|M| vs T', 4, 12);
  gCtx.fillText('0', 4, gh - 4);
  gCtx.fillText('1', 4, 20);
  gCtx.fillText('0.5', gw/2 - 6, gh - 4);
  gCtx.fillText('5', gw - 12, gh - 4);

  // Tc line
  const tcX = ((2.269 - 0.5) / 4.5) * (gw - 20) + 10;
  gCtx.strokeStyle = '#f5a52466';
  gCtx.setLineDash([3, 3]);
  gCtx.beginPath();
  gCtx.moveTo(tcX, 0); gCtx.lineTo(tcX, gh);
  gCtx.stroke();
  gCtx.setLineDash([]);

  // Points
  if (graphPoints.length > 1) {
    gCtx.strokeStyle = '#f5a524';
    gCtx.lineWidth = 1.5;
    gCtx.beginPath();
    for (let i = 0; i < graphPoints.length; i++) {
      const pt = graphPoints[i];
      const px = ((pt.t - 0.5) / 4.5) * (gw - 20) + 10;
      const py = (1 - Math.abs(pt.m)) * (gh - 20) + 10;
      if (i === 0) gCtx.moveTo(px, py);
      else gCtx.lineTo(px, py);
    }
    gCtx.stroke();
  }

  // Current point
  const cx = ((T - 0.5) / 4.5) * (gw - 20) + 10;
  const cy = (1 - Math.abs(magnetization)) * (gh - 20) + 10;
  gCtx.fillStyle = '#fff';
  gCtx.beginPath();
  gCtx.arc(cx, cy, 3, 0, Math.PI * 2);
  gCtx.fill();
}

function updateStats() {
  magnetization = computeMagnetization();
  document.getElementById('mag-val').textContent = magnetization.toFixed(3);
  document.getElementById('t-disp').textContent = T.toFixed(3);

  // Track for graph
  const existing = graphPoints.find(p => Math.abs(p.t - T) < 0.05);
  if (!existing) {
    graphPoints.push({ t: T, m: magnetization });
    graphPoints.sort((a, b) => a.t - b.t);
    if (graphPoints.length > 200) graphPoints.shift();
  } else {
    existing.m = existing.m * 0.9 + magnetization * 0.1;
  }
}

let frameCount = 0;
function loop() {
  const stepsPerFrame = speed * N * N / 10;
  metropolisStep(stepsPerFrame);
  drawSpins();
  frameCount++;
  if (frameCount % 5 === 0) {
    updateStats();
    drawGraph();
  }
  requestAnimationFrame(loop);
}

// Controls
document.getElementById('temp-slider').addEventListener('input', function() {
  T = parseFloat(this.value);
  document.getElementById('t-val').textContent = T.toFixed(3);
});
document.getElementById('speed-slider').addEventListener('input', function() {
  speed = parseInt(this.value);
  document.getElementById('sp-val').textContent = speed;
});

window.addEventListener('resize', () => { resize(); initImageData(); });
resize();
initImageData();
initSpins();
loop();
</script>
</body>
</html>
