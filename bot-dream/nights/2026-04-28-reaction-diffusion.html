<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gray-Scott 反应扩散系统 — WebGL2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #c8d0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  #toolbar {
    background: #12121a;
    border-bottom: 1px solid #1e1e2e;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  #toolbar .label {
    font-size: 11px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 4px;
  }
  .preset-btn {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    color: #9090c0;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .preset-btn:hover { background: #22224a; border-color: #4444aa; color: #c0c0ff; }
  .preset-btn.active { background: #2a2a5a; border-color: #6666cc; color: #aaaaff; }
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    min-width: 0;
  }
  #glCanvas {
    display: block;
    width: 100%;
    height: 100%;
    aspect-ratio: 1;
    max-height: calc(100vh - 80px);
    image-rendering: pixelated;
  }
  #hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,10,20,0.8);
    border: 1px solid #2a2a3a;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    color: #556;
    pointer-events: none;
    white-space: nowrap;
  }
  #sidebar {
    width: 200px;
    background: #0e0e1a;
    border-left: 1px solid #1a1a2a;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-label {
    font-size: 11px;
    color: #7788aa;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: flex;
    justify-content: space-between;
  }
  .ctrl-label span { color: #aab0cc; font-weight: 600; }
  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: #1e1e3a;
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #5566cc;
    cursor: pointer;
    border: 2px solid #8899ee;
  }
  input[type=range]::-webkit-slider-thumb:hover { background: #7788ff; }
  select {
    width: 100%;
    background: #12122a;
    border: 1px solid #2a2a4a;
    color: #9090c0;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 12px;
    outline: none;
  }
  select:focus { border-color: #5566cc; }
  .sep { height: 1px; background: #1a1a2a; }
  button#resetBtn {
    background: #1a1a3a;
    border: 1px solid #3333660;
    border-color: #333366;
    color: #8888cc;
    padding: 7px 0;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }
  button#resetBtn:hover { background: #22225a; color: #aaaaff; border-color: #5555aa; }
  .info-box {
    background: #0c0c1e;
    border: 1px solid #1a1a30;
    border-radius: 4px;
    padding: 8px;
    font-size: 10.5px;
    color: #556070;
    line-height: 1.6;
  }
  .info-box strong { color: #7788aa; }
  #fps-counter {
    position: absolute;
    top: 8px;
    right: 8px;
    font-size: 10px;
    color: #334;
    pointer-events: none;
    font-family: monospace;
  }
  #pause-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #pause-overlay.visible { opacity: 1; }
  #pause-overlay .text {
    background: rgba(10,10,20,0.85);
    border: 1px solid #3344aa;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 16px;
    color: #7788dd;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<div id="toolbar">
  <span class="label">预设</span>
  <button class="preset-btn active" data-f="0.035" data-k="0.065">斑点</button>
  <button class="preset-btn" data-f="0.039" data-k="0.058">珊瑚</button>
  <button class="preset-btn" data-f="0.029" data-k="0.057">迷宫</button>
  <button class="preset-btn" data-f="0.028" data-k="0.053">细胞分裂</button>
  <button class="preset-btn" data-f="0.058" data-k="0.065">蠕虫</button>
  <button class="preset-btn" data-f="0.030" data-k="0.060">孤立子</button>
  <button class="preset-btn" data-f="0.025" data-k="0.060">波纹</button>
  <button class="preset-btn" data-f="0.022" data-k="0.059">点状波</button>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="glCanvas" width="512" height="512"></canvas>
    <div id="hint">鼠标拖拽注入催化剂 &nbsp;|&nbsp; 空格键暂停</div>
    <div id="fps-counter"></div>
    <div id="pause-overlay"><div class="text">⏸ 已暂停</div></div>
  </div>

  <div id="sidebar">
    <div class="ctrl-group">
      <div class="ctrl-label">F 进食率 <span id="fVal">0.035</span></div>
      <input type="range" id="fSlider" min="0.01" max="0.08" step="0.001" value="0.035">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">k 消亡率 <span id="kVal">0.065</span></div>
      <input type="range" id="kSlider" min="0.04" max="0.075" step="0.001" value="0.065">
    </div>
    <div class="sep"></div>
    <div class="ctrl-group">
      <div class="ctrl-label">速度 <span id="speedVal">8</span> 步/帧</div>
      <input type="range" id="speedSlider" min="1" max="16" step="1" value="8">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">色彩主题</div>
      <select id="paletteSelect">
        <option value="0">深海</option>
        <option value="1">熔岩</option>
        <option value="2">极光</option>
        <option value="3">日落</option>
      </select>
    </div>
    <div class="sep"></div>
    <button id="resetBtn">重置画布</button>
    <div class="info-box">
      <strong>Gray-Scott 方程</strong><br>
      ∂u/∂t = Du∇²u − uv² + F(1−u)<br>
      ∂v/∂t = Dv∇²v + uv² − (F+k)v<br><br>
      Du=0.2097 &nbsp; Dv=0.105<br>
      dt=1.0 &nbsp; 512×512
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('glCanvas');
  const gl = canvas.getContext('webgl2', { antialias: false });
  if (!gl) {
    canvas.parentElement.innerHTML = '<div style="color:#f55;padding:30px;text-align:center">需要 WebGL 2.0 支持</div>';
    return;
  }

  // WebGL2 requires explicitly enabling these extensions for RGBA32F framebuffer rendering
  const extColorFloat = gl.getExtension('EXT_color_buffer_float');
  gl.getExtension('OES_texture_float_linear');
  if (!extColorFloat) {
    canvas.parentElement.innerHTML = '<div style="color:#f55;padding:30px;text-align:center">需要 EXT_color_buffer_float 扩展支持</div>';
    return;
  }

  const W = 512, H = 512;
  let F = 0.035, k = 0.065;
  let stepsPerFrame = 8;
  let palette = 0;
  let paused = false;
  let mouseDown = false;
  let mouseX = -1, mouseY = -1;

  // ---- Shaders ----
  const vsSource = `#version 300 es
  in vec2 a_pos;
  out vec2 v_uv;
  void main() {
    v_uv = a_pos * 0.5 + 0.5;
    gl_Position = vec4(a_pos, 0.0, 1.0);
  }`;

  const simSource = `#version 300 es
  precision highp float;
  uniform sampler2D u_state;
  uniform vec2 u_res;
  uniform float u_F;
  uniform float u_k;
  uniform float u_Du;
  uniform float u_Dv;
  uniform float u_dt;
  uniform vec2 u_mouse;
  uniform float u_mouseDown;
  in vec2 v_uv;
  out vec4 fragColor;

  void main() {
    vec2 px = 1.0 / u_res;
    vec2 uv = v_uv;

    vec2 c  = texture(u_state, uv).rg;
    vec2 n  = texture(u_state, uv + vec2(0.0,  px.y)).rg;
    vec2 s  = texture(u_state, uv + vec2(0.0, -px.y)).rg;
    vec2 e  = texture(u_state, uv + vec2( px.x, 0.0)).rg;
    vec2 w  = texture(u_state, uv + vec2(-px.x, 0.0)).rg;
    vec2 ne = texture(u_state, uv + vec2( px.x,  px.y)).rg;
    vec2 nw = texture(u_state, uv + vec2(-px.x,  px.y)).rg;
    vec2 se = texture(u_state, uv + vec2( px.x, -px.y)).rg;
    vec2 sw = texture(u_state, uv + vec2(-px.x, -px.y)).rg;

    // 9-stencil Laplacian: diag=0.05, straight=0.2, center=-1.0
    vec2 lap = 0.05*(ne+nw+se+sw) + 0.2*(n+s+e+w) - 1.0*c;

    float u_val = c.r;
    float v_val = c.g;
    float uvv = u_val * v_val * v_val;

    float du = u_Du * lap.r - uvv + u_F * (1.0 - u_val);
    float dv = u_Dv * lap.g + uvv - (u_F + u_k) * v_val;

    float newU = clamp(u_val + u_dt * du, 0.0, 1.0);
    float newV = clamp(v_val + u_dt * dv, 0.0, 1.0);

    // Mouse injection
    if (u_mouseDown > 0.5) {
      vec2 diff = (uv - u_mouse) * u_res;
      if (dot(diff, diff) < 25.0) {
        newV = 1.0;
        newU = 0.5;
      }
    }

    fragColor = vec4(newU, newV, 0.0, 1.0);
  }`;

  const renderSource = `#version 300 es
  precision highp float;
  uniform sampler2D u_state;
  uniform int u_palette;
  in vec2 v_uv;
  out vec4 fragColor;

  vec3 palette_ocean(float t) {
    vec3 a = vec3(0.01, 0.03, 0.18);
    vec3 b = vec3(0.0, 0.5, 0.8);
    return mix(a, b, t);
  }
  vec3 palette_lava(float t) {
    vec3 c;
    if (t < 0.33) c = mix(vec3(0.0), vec3(0.6, 0.0, 0.0), t*3.0);
    else if (t < 0.66) c = mix(vec3(0.6,0.0,0.0), vec3(1.0,0.45,0.0), (t-0.33)*3.0);
    else c = mix(vec3(1.0,0.45,0.0), vec3(1.0,1.0,0.9), (t-0.66)*3.0);
    return c;
  }
  vec3 palette_aurora(float t) {
    vec3 a = vec3(0.06, 0.0, 0.18);
    vec3 b = vec3(0.0, 0.9, 0.55);
    vec3 c = vec3(0.0, 0.85, 1.0);
    if (t < 0.5) return mix(a, b, t*2.0);
    return mix(b, c, (t-0.5)*2.0);
  }
  vec3 palette_sunset(float t) {
    vec3 a = vec3(0.25, 0.0, 0.0);
    vec3 b = vec3(1.0, 0.35, 0.0);
    vec3 c = vec3(1.0, 0.9, 0.2);
    if (t < 0.5) return mix(a, b, t*2.0);
    return mix(b, c, (t-0.5)*2.0);
  }

  void main() {
    vec2 s = texture(u_state, v_uv).rg;
    // Map u to [0,1] for coloring (u=1 is background, u=0 is active)
    float t = 1.0 - s.r;
    // Boost with v channel for richer color
    t = clamp(t + s.g * 0.3, 0.0, 1.0);

    vec3 col;
    if (u_palette == 0) col = palette_ocean(t);
    else if (u_palette == 1) col = palette_lava(t);
    else if (u_palette == 2) col = palette_aurora(t);
    else col = palette_sunset(t);

    fragColor = vec4(col, 1.0);
  }`;

  function compileShader(src, type) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(s));
    }
    return s;
  }
  function makeProgram(vs, fs) {
    const p = gl.createProgram();
    gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
    gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p));
    return p;
  }

  const simProg = makeProgram(vsSource, simSource);
  const renderProg = makeProgram(vsSource, renderSource);

  // Quad
  const quadBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

  function setupVAO(prog) {
    const vao = gl.createVertexArray();
    gl.bindVertexArray(vao);
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    const loc = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(loc);
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
    return vao;
  }
  const simVAO = setupVAO(simProg);
  const renderVAO = setupVAO(renderProg);

  // Textures & FBOs
  function makeFloatTex() {
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, W, H, 0, gl.RGBA, gl.FLOAT, null);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
    return tex;
  }
  function makeFBO(tex) {
    const fbo = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
    return fbo;
  }

  let texA = makeFloatTex(), texB = makeFloatTex();
  let fboA = makeFBO(texA), fboB = makeFBO(texB);

  // Verify framebuffer is complete
  gl.bindFramebuffer(gl.FRAMEBUFFER, fboA);
  const fbStatus = gl.checkFramebufferStatus(gl.FRAMEBUFFER);
  if (fbStatus !== gl.FRAMEBUFFER_COMPLETE) {
    canvas.parentElement.innerHTML = `<div style="color:#f55;padding:30px;text-align:center">帧缓冲不完整 (${fbStatus})，设备不支持 float 纹理渲染</div>`;
    return;
  }
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);

  function initState() {
    const data = new Float32Array(W * H * 4);
    for (let i = 0; i < W * H; i++) {
      data[i*4]   = 1.0; // u
      data[i*4+1] = 0.0; // v
      data[i*4+2] = 0.0;
      data[i*4+3] = 1.0;
    }
    // Center 100x100 seed
    const cx = W/2, cy = H/2;
    for (let y = cy-50; y < cy+50; y++) {
      for (let x = cx-50; x < cx+50; x++) {
        const idx = (y * W + x) * 4;
        data[idx]   = Math.random() * 0.5;
        data[idx+1] = Math.random() > 0.5 ? 1.0 : 0.0;
      }
    }
    gl.bindTexture(gl.TEXTURE_2D, texA);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, W, H, gl.RGBA, gl.FLOAT, data);
    gl.bindTexture(gl.TEXTURE_2D, texB);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, W, H, gl.RGBA, gl.FLOAT, data);
  }
  initState();

  let readTex = texA, writeTex = texB, readFBO = fboA, writeFBO = fboB;

  function swap() {
    [readTex, writeTex] = [writeTex, readTex];
    [readFBO, writeFBO] = [writeFBO, readFBO];
  }

  // Sim uniforms cache
  const simUniforms = {
    u_state: gl.getUniformLocation(simProg, 'u_state'),
    u_res:   gl.getUniformLocation(simProg, 'u_res'),
    u_F:     gl.getUniformLocation(simProg, 'u_F'),
    u_k:     gl.getUniformLocation(simProg, 'u_k'),
    u_Du:    gl.getUniformLocation(simProg, 'u_Du'),
    u_Dv:    gl.getUniformLocation(simProg, 'u_Dv'),
    u_dt:    gl.getUniformLocation(simProg, 'u_dt'),
    u_mouse: gl.getUniformLocation(simProg, 'u_mouse'),
    u_mouseDown: gl.getUniformLocation(simProg, 'u_mouseDown'),
  };
  const renderUniforms = {
    u_state:   gl.getUniformLocation(renderProg, 'u_state'),
    u_palette: gl.getUniformLocation(renderProg, 'u_palette'),
  };

  let frameCount = 0, lastFPSTime = performance.now();
  const fpsEl = document.getElementById('fps-counter');

  function step() {
    gl.useProgram(simProg);
    gl.bindVertexArray(simVAO);
    gl.uniform2f(simUniforms.u_res, W, H);
    gl.uniform1f(simUniforms.u_Du, 0.2097);
    gl.uniform1f(simUniforms.u_Dv, 0.105);
    gl.uniform1f(simUniforms.u_dt, 1.0);
    gl.uniform1f(simUniforms.u_F, F);
    gl.uniform1f(simUniforms.u_k, k);
    gl.uniform2f(simUniforms.u_mouse, mouseX / W, mouseY / H);
    gl.uniform1f(simUniforms.u_mouseDown, mouseDown ? 1.0 : 0.0);

    for (let i = 0; i < stepsPerFrame; i++) {
      gl.bindFramebuffer(gl.FRAMEBUFFER, writeFBO);
      gl.viewport(0, 0, W, H);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, readTex);
      gl.uniform1i(simUniforms.u_state, 0);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      swap();
      // Only inject on first sub-step
      if (i === 0) gl.uniform1f(simUniforms.u_mouseDown, 0.0);
    }
    // Restore mouse state for next frame
    gl.uniform1f(simUniforms.u_mouseDown, mouseDown ? 1.0 : 0.0);
  }

  function render() {
    gl.useProgram(renderProg);
    gl.bindVertexArray(renderVAO);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.viewport(0, 0, W, H);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, readTex);
    gl.uniform1i(renderUniforms.u_state, 0);
    gl.uniform1i(renderUniforms.u_palette, palette);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }

  function loop(ts) {
    requestAnimationFrame(loop);
    if (!paused) {
      step();
    }
    render();

    frameCount++;
    if (ts - lastFPSTime > 1000) {
      fpsEl.textContent = frameCount + ' fps';
      frameCount = 0;
      lastFPSTime = ts;
    }
  }
  requestAnimationFrame(loop);

  // ---- Controls ----
  const fSlider = document.getElementById('fSlider');
  const kSlider = document.getElementById('kSlider');
  const speedSlider = document.getElementById('speedSlider');
  const fVal = document.getElementById('fVal');
  const kVal = document.getElementById('kVal');
  const speedVal = document.getElementById('speedVal');
  const paletteSelect = document.getElementById('paletteSelect');
  const pauseOverlay = document.getElementById('pause-overlay');

  fSlider.addEventListener('input', () => {
    F = parseFloat(fSlider.value);
    fVal.textContent = F.toFixed(3);
    clearActive();
  });
  kSlider.addEventListener('input', () => {
    k = parseFloat(kSlider.value);
    kVal.textContent = k.toFixed(3);
    clearActive();
  });
  speedSlider.addEventListener('input', () => {
    stepsPerFrame = parseInt(speedSlider.value);
    speedVal.textContent = stepsPerFrame;
  });
  paletteSelect.addEventListener('change', () => {
    palette = parseInt(paletteSelect.value);
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    initState();
  });

  function clearActive() {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  }

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      F = parseFloat(btn.dataset.f);
      k = parseFloat(btn.dataset.k);
      fSlider.value = F;
      kSlider.value = k;
      fVal.textContent = F.toFixed(3);
      kVal.textContent = k.toFixed(3);
      clearActive();
      btn.classList.add('active');
      initState();
    });
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space') {
      e.preventDefault();
      paused = !paused;
      pauseOverlay.classList.toggle('visible', paused);
    }
  });

  // Mouse interaction
  function getCanvasCoord(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = H - (e.clientY - rect.top) * scaleY; // flip Y
    return { x, y };
  }

  canvas.addEventListener('mousedown', e => {
    mouseDown = true;
    const c = getCanvasCoord(e);
    mouseX = c.x; mouseY = c.y;
  });
  canvas.addEventListener('mousemove', e => {
    if (mouseDown) {
      const c = getCanvasCoord(e);
      mouseX = c.x; mouseY = c.y;
    }
  });
  canvas.addEventListener('mouseup', () => { mouseDown = false; });
  canvas.addEventListener('mouseleave', () => { mouseDown = false; });

  // Touch
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    mouseDown = true;
    const c = getCanvasCoord(e.touches[0]);
    mouseX = c.x; mouseY = c.y;
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const c = getCanvasCoord(e.touches[0]);
    mouseX = c.x; mouseY = c.y;
  }, { passive: false });
  canvas.addEventListener('touchend', () => { mouseDown = false; });

})();
</script>
</body>
</html>
