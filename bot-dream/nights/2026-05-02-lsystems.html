<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night 5 · L-Systems</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080c10; overflow: hidden; font-family: monospace; color: #ccc; }
canvas { display: block; }
#ui {
  position: fixed; top: 12px; left: 12px;
  font-size: 11px; line-height: 1.6; color: #6f8;
  text-shadow: 0 0 8px #6f8;
  pointer-events: none;
}
#controls {
  position: fixed; top: 12px; right: 12px;
  display: flex; flex-direction: column; gap: 5px; align-items: flex-end;
}
.preset-btn {
  background: rgba(0,60,20,0.3); border: 1px solid #6f8;
  color: #6f8; padding: 4px 10px; font-family: monospace;
  font-size: 11px; cursor: pointer; border-radius: 3px;
  transition: all 0.2s; min-width: 90px; text-align: center;
}
.preset-btn:hover, .preset-btn.active { background: rgba(0,140,60,0.4); color: #fff; }
#caption {
  position: fixed; bottom: 0; left: 0; right: 0;
  text-align: center; padding: 10px 20px 14px;
  font-family: 'PingFang SC', 'Noto Sans SC', sans-serif;
  font-size: 12px; line-height: 1.7; color: #aaa;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  pointer-events: none;
}
#info {
  position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: #444; pointer-events: none; white-space: nowrap;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div>▓ NIGHT LAB · N05</div>
  <div>2026-05-02</div>
  <div style="color:#888" id="current-name">L-Systems</div>
</div>
<div id="controls">
  <button class="preset-btn active" onclick="selectPreset(0,this)">植物 Plant</button>
  <button class="preset-btn" onclick="selectPreset(1,this)">龙形 Dragon</button>
  <button class="preset-btn" onclick="selectPreset(2,this)">科赫 Koch</button>
  <button class="preset-btn" onclick="selectPreset(3,this)">希尔伯特</button>
  <button class="preset-btn" onclick="selectPreset(4,this)">蕨类 Fern</button>
  <button class="preset-btn" onclick="selectPreset(5,this)">莱维曲线</button>
  <button class="preset-btn" onclick="selectPreset(6,this)">谢尔宾斯基</button>
  <button class="preset-btn" onclick="selectPreset(7,this)">雪花</button>
</div>
<div id="info" id="sys-info"></div>
<div id="caption">「把字母F替换成F+F-F，重复十次，然后把F翻译成"往前走"，+翻译成"左转"。真正的植物细胞分裂，用的是完全一样的递归逻辑。语法就是生长。」</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const PRESETS = [
  {
    name: '植物 Plant', axiom: 'X', angle: 25, iter: 6,
    rules: { X: 'F+[[X]-X]-F[-FX]+X', F: 'FF' },
    color: '#5dfc8a'
  },
  {
    name: '龙形 Dragon', axiom: 'FX', angle: 90, iter: 13,
    rules: { X: 'X+YF+', Y: '-FX-Y' },
    color: '#f06090'
  },
  {
    name: '科赫 Koch', axiom: 'F', angle: 60, iter: 5,
    rules: { F: 'F+F--F+F' },
    color: '#60c8ff'
  },
  {
    name: '希尔伯特 Hilbert', axiom: 'A', angle: 90, iter: 6,
    rules: { A: '+BF-AFA-FB+', B: '-AF+BFB+FA-' },
    color: '#ffd060'
  },
  {
    name: '蕨类 Fern', axiom: 'X', angle: 22.5, iter: 7,
    rules: { X: 'F+[[X]-X]-F[-FX]+X', F: 'FF' },
    color: '#80ff60'
  },
  {
    name: '莱维曲线 Levy', axiom: 'F', angle: 45, iter: 14,
    rules: { F: '+F--F+' },
    color: '#c0a0ff'
  },
  {
    name: '谢尔宾斯基 Sierpinski', axiom: 'F-G-G', angle: 120, iter: 7,
    rules: { F: 'F-G+F+G-F', G: 'GG' },
    color: '#ff9060'
  },
  {
    name: '雪花 Snowflake', axiom: 'F++F++F', angle: 60, iter: 5,
    rules: { F: 'F-F++F-F' },
    color: '#a0e8ff'
  }
];

let currentPreset = 0;
let drawCommands = [];
let drawIndex = 0;
let animId = null;
let turtleState = null;

function expandLSystem(preset) {
  let str = preset.axiom;
  for (let i = 0; i < preset.iter; i++) {
    let next = '';
    for (const ch of str) {
      next += preset.rules[ch] || ch;
    }
    str = next;
    if (str.length > 600000) break;
  }
  return str;
}

function computeBounds(cmds, preset) {
  let x = 0, y = 0, angle = -90;
  const rad = preset.angle * Math.PI / 180;
  const stack = [];
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const ch of cmds) {
    if (ch === 'F' || ch === 'G') {
      x += Math.cos(angle * Math.PI / 180);
      y += Math.sin(angle * Math.PI / 180);
      if (x < minX) minX = x; if (x > maxX) maxX = x;
      if (y < minY) minY = y; if (y > maxY) maxY = y;
    } else if (ch === '+') { angle += preset.angle; }
    else if (ch === '-') { angle -= preset.angle; }
    else if (ch === '[') { stack.push([x, y, angle]); }
    else if (ch === ']') { const s = stack.pop(); x=s[0]; y=s[1]; angle=s[2]; }
  }
  return { minX, minY, maxX, maxY };
}

function selectPreset(idx, btn) {
  currentPreset = idx;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('current-name').textContent = PRESETS[idx].name;
  startDraw();
}

function startDraw() {
  if (animId) cancelAnimationFrame(animId);
  ctx.fillStyle = '#080c10';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const preset = PRESETS[currentPreset];
  const str = expandLSystem(preset);
  drawCommands = str;

  // compute bounds and fit
  const bounds = computeBounds(str, preset);
  const W = canvas.width, H = canvas.height;
  const margin = 0.08;
  const bw = bounds.maxX - bounds.minX || 1;
  const bh = bounds.maxY - bounds.minY || 1;
  const scaleX = (W * (1 - 2*margin)) / bw;
  const scaleY = (H * 0.78 * (1 - 2*margin)) / bh;
  const scale = Math.min(scaleX, scaleY);
  const ox = W/2 - (bounds.minX + bw/2) * scale;
  const oy = H * 0.44 - (bounds.minY + bh/2) * scale;

  turtleState = {
    x: ox, y: oy, angle: -90,
    scale, ox, oy, preset,
    stack: [], cmdIdx: 0,
    str, color: preset.color
  };

  ctx.strokeStyle = preset.color;
  ctx.lineWidth = Math.max(0.4, Math.min(1.5, 300 / str.length * 10));
  ctx.shadowColor = preset.color;
  ctx.shadowBlur = 3;
  ctx.beginPath();
  ctx.moveTo(ox, oy);

  animate();
}

function animate() {
  const t = turtleState;
  if (!t) return;
  const batchSize = Math.max(50, Math.floor(t.str.length / 120));

  let drawing = false;
  for (let i = 0; i < batchSize && t.cmdIdx < t.str.length; i++, t.cmdIdx++) {
    const ch = t.str[t.cmdIdx];
    if (ch === 'F' || ch === 'G') {
      const nx = t.x + Math.cos(t.angle * Math.PI / 180) * t.scale;
      const ny = t.y + Math.sin(t.angle * Math.PI / 180) * t.scale;
      if (!drawing) { ctx.beginPath(); ctx.moveTo(t.x, t.y); drawing = true; }
      ctx.lineTo(nx, ny);
      t.x = nx; t.y = ny;
    } else if (ch === 'f') {
      if (drawing) { ctx.stroke(); drawing = false; }
      t.x += Math.cos(t.angle * Math.PI / 180) * t.scale;
      t.y += Math.sin(t.angle * Math.PI / 180) * t.scale;
      ctx.moveTo(t.x, t.y);
    } else if (ch === '+') {
      t.angle += t.preset.angle;
    } else if (ch === '-') {
      t.angle -= t.preset.angle;
    } else if (ch === '[') {
      if (drawing) { ctx.stroke(); drawing = false; }
      t.stack.push({ x: t.x, y: t.y, angle: t.angle });
      ctx.moveTo(t.x, t.y);
    } else if (ch === ']') {
      if (drawing) { ctx.stroke(); drawing = false; }
      const s = t.stack.pop();
      t.x = s.x; t.y = s.y; t.angle = s.angle;
      ctx.moveTo(t.x, t.y);
    }
  }
  if (drawing) ctx.stroke();

  if (t.cmdIdx < t.str.length) {
    animId = requestAnimationFrame(animate);
  }
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  startDraw();
}

resize();
window.addEventListener('resize', resize);
</script>
</body>
</html>
