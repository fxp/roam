<!DOCTYPE html>
<html lang="zh-Hans" data-theme="mint">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Dream · 问野的实验日历</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../kit.css">
<style>

/* ── LAYOUT ────────────────────────────────────────────── */
.page-wrap {
  max-width: var(--w-wrap); margin: 0 auto; padding: 0 5vw;
}
@media (min-width: 1024px) { .page-wrap { padding: 0 48px; } }

/* ── NAV STRIP ─────────────────────────────────────────── */
.nav-strip {
  border-bottom: var(--border); padding: 13px 0; position: relative; z-index: 2;
}
.nav-inner {
  max-width: var(--w-wrap); margin: 0 auto; padding: 0 5vw;
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  font-family: var(--mono); font-size: 10px; letter-spacing: var(--track-mono);
  text-transform: uppercase; color: var(--fg-mute);
}
@media (min-width: 1024px) { .nav-inner { padding: 0 48px; } }
.nav-inner a { color: var(--fg-mute); text-decoration: none; transition: color var(--d-fast); }
.nav-inner a:hover { color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 14px; }
button[data-toggle-mode] {
  font-family: var(--mono); font-size: 10px; letter-spacing: var(--track-mono);
  text-transform: uppercase; color: var(--fg-mute);
  background: none; border: none; cursor: pointer;
  transition: color var(--d-fast);
}
button[data-toggle-mode]:hover { color: var(--accent); }

/* ── HERO ──────────────────────────────────────────────── */
.hero {
  padding: 56px 0 52px;
  border-bottom: var(--border);
  position: relative; z-index: 2;
}
.hero-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: var(--accent);
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 28px;
}
.hero-label::after { content: '▋'; font-size: 0.7em; animation: blink 1.1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.hero h1 {
  font-family: var(--display); font-weight: 300;
  font-size: clamp(48px, 10vw, 112px); line-height: 0.9;
  letter-spacing: -0.03em; margin: 0 0 24px; color: var(--fg);
}
.hero h1 span {
  background: linear-gradient(135deg, var(--accent) 0%, #06b6d4 60%, #818cf8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  display: block;
}
.hero-sub {
  font-family: var(--serif); font-size: 17px; line-height: 1.7;
  color: var(--fg-dim); max-width: 540px;
  border-left: 2px solid var(--accent); padding-left: 16px;
}

/* ── STATS BAR ─────────────────────────────────────────── */
.stats-bar {
  display: flex; gap: 1px; background: var(--line);
  border: var(--border); margin-top: 40px;
  max-width: 480px;
}
.stat-item {
  background: var(--bg); padding: 14px 20px; flex: 1;
}
.stat-lbl {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--fg-mute); margin-bottom: 8px;
}
.stat-val {
  font-family: var(--display); font-size: 32px; font-weight: 400; line-height: 1;
  background: linear-gradient(135deg, var(--accent) 0%, #06b6d4 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: -0.01em;
}

/* ── CALENDAR SECTION ──────────────────────────────────── */
.cal-section {
  padding: 64px 0 0;
  border-bottom: var(--border);
  position: relative; z-index: 2;
}
.sec-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--accent);
  border-top: 1px solid var(--accent); padding-top: 10px;
  display: inline-flex; align-items: center; gap: 6px;
  margin-bottom: 32px;
}
.cal-outer {
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: thin;
  scrollbar-color: var(--line) transparent;
}
.cal-outer::-webkit-scrollbar { height: 3px; }
.cal-outer::-webkit-scrollbar-track { background: transparent; }
.cal-outer::-webkit-scrollbar-thumb { background: var(--line); }

/* GitHub contributions grid */
.hm-wrap {
  display: inline-block;
  min-width: max-content;
}
.hm-row-wrap {
  display: flex; gap: 0; align-items: flex-start;
}
.hm-day-labels {
  display: flex; flex-direction: column;
  gap: 2px; margin-right: 6px;
  padding-top: 22px; /* align with grid (month label height) */
}
.hm-day-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
  color: var(--fg-mute); text-transform: uppercase;
  height: 11px; line-height: 11px;
  /* only show Mon, Wed, Fri */
}
.hm-day-label:not(.show) { visibility: hidden; }

.hm-months {
  position: relative; height: 18px; margin-bottom: 4px;
}
.hm-month-label {
  position: absolute; top: 0;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  color: var(--fg-mute); text-transform: uppercase;
  white-space: nowrap; line-height: 18px;
}
.hm-grid {
  display: grid;
  grid-template-rows: repeat(7, 11px);
  grid-auto-columns: 11px;
  grid-auto-flow: column;
  gap: 2px;
}
.hm-cell {
  width: 11px; height: 11px;
  background: var(--bg-2);
  border-radius: 2px;
  cursor: default;
  transition: opacity 0.15s;
}
.hm-cell.future {
  opacity: 0.35;
}
.hm-cell.out-of-year {
  opacity: 0;
  pointer-events: none;
}
.hm-cell.has-exp {
  background: var(--accent);
  cursor: pointer;
}
.hm-cell.has-exp:hover {
  opacity: 0.75;
}
.hm-cell.has-exp.screenshot-only {
  background: var(--accent);
  opacity: 0.45;
}
.hm-cell.has-exp.screenshot-only:hover {
  opacity: 0.65;
}
.hm-cell.today {
  outline: 1.5px solid var(--accent);
  outline-offset: 1px;
}
.hm-cell.active {
  outline: 2px solid var(--fg);
  outline-offset: 1px;
}

/* ── EXPERIMENT PANEL ──────────────────────────────────── */
.exp-panel {
  margin-top: 16px; margin-bottom: 56px;
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.25s ease;
  max-height: 0; opacity: 0;
}
.exp-panel.open { max-height: 280px; opacity: 1; }
.panel-inner {
  background: var(--bg-2); border: var(--border); padding: 20px 24px;
}
.panel-date {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--fg-mute); margin-bottom: 14px;
}
.panel-exp-link {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 18px;
  background: var(--bg); border: var(--border);
  text-decoration: none;
  transition: background var(--d-fast), border-color var(--d-fast);
  margin-bottom: 8px;
}
.panel-exp-link:last-child { margin-bottom: 0; }
.panel-exp-link:hover { background: var(--bg-3); border-color: var(--line-bright); }
.panel-exp-nolink {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 18px; background: var(--bg); border: var(--border);
  opacity: 0.6;
}
.panel-exp-title {
  font-family: var(--serif); font-size: 15px; font-weight: 500;
  color: var(--fg); margin-bottom: 4px; line-height: 1.35;
}
.panel-exp-desc {
  font-family: var(--mono); font-size: 10px; color: var(--fg-mute);
  letter-spacing: 0.05em;
}
.panel-exp-badge {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--accent);
  border: 1px solid var(--accent); padding: 2px 6px; flex-shrink: 0;
}
.panel-exp-badge.no-file {
  color: var(--fg-mute); border-color: var(--line);
}
.panel-arrow {
  margin-left: auto; font-size: 12px; color: var(--fg-mute);
  flex-shrink: 0;
  transition: color var(--d-fast);
}
.panel-exp-link:hover .panel-arrow { color: var(--accent); }
.cal-legend {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  margin-top: 14px; margin-bottom: 64px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--fg-mute);
}
.legend-row { display: flex; align-items: center; gap: 4px; }
.legend-cell {
  width: 10px; height: 10px; border-radius: 2px;
}
.legend-cell.empty { background: var(--bg-2); }
.legend-cell.active { background: var(--accent); }
.legend-cell.screenshot { background: var(--accent); opacity: 0.45; }

/* ── RECENT EXPERIMENTS ─────────────────────────────────── */
.recent-section {
  padding: 64px 0;
  border-bottom: var(--border);
  position: relative; z-index: 2;
}
.exp-list {
  display: flex; flex-direction: column; gap: 1px;
  background: var(--line); border: var(--border);
  margin-top: 28px;
}
.exp-row {
  display: grid; grid-template-columns: 48px 1fr auto;
  align-items: center; gap: 0;
  background: var(--bg-2);
  text-decoration: none;
  transition: background var(--d-fast);
}
.exp-row:hover { background: var(--bg-3); }
.exp-row.no-link { opacity: 0.6; cursor: default; }
.exp-num {
  padding: 14px 16px; border-right: var(--border);
  font-family: var(--display); font-size: 15px; line-height: 1;
  color: var(--accent); text-align: center;
}
.exp-body {
  padding: 14px 18px;
}
.exp-title-text {
  font-family: var(--serif); font-size: 14px; font-weight: 500;
  color: var(--fg); margin-bottom: 3px; line-height: 1.35;
}
.exp-meta-text {
  font-family: var(--mono); font-size: 9px; color: var(--fg-mute);
  letter-spacing: 0.08em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.exp-date-col {
  padding: 14px 16px; border-left: var(--border);
  font-family: var(--mono); font-size: 9px; color: var(--fg-mute);
  letter-spacing: 0.08em; white-space: nowrap;
}

/* ── ARCHIVE LINK ───────────────────────────────────────── */
.archive-link {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 20px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--accent); text-decoration: none;
  border: 1px solid var(--accent); padding: 8px 18px;
  transition: background var(--d-fast);
}
.archive-link:hover { background: var(--accent-soft); }

/* ── FOOTER ─────────────────────────────────────────────── */
footer {
  padding: 36px 0; position: relative; z-index: 2;
}
.footer-inner {
  max-width: var(--w-wrap); margin: 0 auto; padding: 0 5vw;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--fg-mute);
}
@media (min-width: 1024px) { .footer-inner { padding: 0 48px; } }
footer a { color: var(--fg-mute); text-decoration: none; }
footer a:hover { color: var(--accent); }

</style>
</head>

<script src="../mode-toggle.js" defer></script>
<script>
/* ── Config ──────────────────────────────────────────────── */
const YEAR = 2026;
const CELL = 11;    // cell size px
const GAP  = 2;     // gap px
const COL_W = CELL + GAP;  // 13px per week column

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TODAY = new Date();
TODAY.setHours(0,0,0,0);

/* ── Date helpers ────────────────────────────────────────── */
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}
function dayOfWeek(d) {
  // Mon=0 ... Sun=6
  return (d.getDay() + 6) % 7;
}

/* ── Compute grid range ───────────────────────────────────── */
function gridRange(year) {
  const jan1 = new Date(year, 0, 1);
  const dec31 = new Date(year, 11, 31);
  // Monday of week containing Jan 1
  const start = addDays(jan1, -dayOfWeek(jan1));
  // Sunday of week containing Dec 31
  const end = addDays(dec31, 6 - dayOfWeek(dec31));
  return { start, end };
}

/* ── Load experiments and render ─────────────────────────── */
fetch('./experiments.json')
  .then(r => r.json())
  .then(data => render(data.experiments))
  .catch(() => {
    // fallback: show empty calendar
    render([]);
  });

function render(experiments) {
  // Build lookup: date -> experiment
  const expMap = {};
  experiments.forEach(e => {
    if (!expMap[e.date]) expMap[e.date] = [];
    expMap[e.date].push(e);
  });

  // Stats
  const activeDays = Object.keys(expMap).length;
  const totalExp = experiments.length;
  const firstDate = experiments.length ? experiments[0].date : '—';
  document.getElementById('stat-total').textContent = totalExp;
  document.getElementById('stat-days').textContent = activeDays;
  document.getElementById('stat-start').textContent =
    firstDate !== '—' ? firstDate.slice(5) : '—'; // MM-DD

  // Build calendar
  buildCalendar(expMap);

  // Build recent experiments list (last 8, newest first)
  buildRecentList(experiments);
}

function buildCalendar(expMap) {
  const { start, end } = gridRange(YEAR);
  const grid = document.getElementById('hm-grid');
  const monthsEl = document.getElementById('hm-months');

  let weekCol = 0;
  let cur = new Date(start);
  let monthsRendered = new Set();
  let activeCell = null;

  while (cur <= end) {
    const dow = dayOfWeek(cur);  // 0=Mon, must be 0 at start of each week

    // Month label: show at start of month, aligned to current week column
    const isFirstOfMonth = cur.getDate() === 1;
    const monthKey = `${cur.getFullYear()}-${cur.getMonth()}`;
    if (isFirstOfMonth && cur.getFullYear() === YEAR && !monthsRendered.has(monthKey)) {
      monthsRendered.add(monthKey);
      const lbl = document.createElement('span');
      lbl.className = 'hm-month-label';
      lbl.textContent = MONTHS[cur.getMonth()];
      lbl.style.left = `${weekCol * COL_W}px`;
      monthsEl.appendChild(lbl);
    }

    // Create cell
    const ds = dateStr(cur);
    const cell = document.createElement('div');
    cell.className = 'hm-cell';
    cell.dataset.date = ds;

    const isCurrentYear = cur.getFullYear() === YEAR;
    const isFuture = cur > TODAY;
    const exps = expMap[ds];

    if (!isCurrentYear) {
      cell.classList.add('out-of-year');
    } else if (exps) {
      const allScreenshot = exps.every(e => e.type === 'screenshot-only');
      cell.classList.add('has-exp');
      if (allScreenshot) cell.classList.add('screenshot-only');
      cell.title = exps.map(e => e.title).join(' / ');
      cell.addEventListener('click', () => togglePanel(cell, ds, exps, expMap));
    } else if (isFuture) {
      cell.classList.add('future');
    }

    if (ds === dateStr(TODAY)) cell.classList.add('today');

    grid.appendChild(cell);

    // Advance
    cur = addDays(cur, 1);
    if (dayOfWeek(cur) === 0) weekCol++; // moved to next week
  }
}

/* ── Panel toggle ─────────────────────────────────────────── */
let activeCellEl = null;

function togglePanel(cellEl, ds, exps, expMap) {
  const panel = document.getElementById('exp-panel');
  const panelDate = document.getElementById('panel-date');
  const panelContent = document.getElementById('panel-content');

  if (activeCellEl === cellEl) {
    // Close
    panel.classList.remove('open');
    cellEl.classList.remove('active');
    activeCellEl = null;
    return;
  }

  if (activeCellEl) activeCellEl.classList.remove('active');
  cellEl.classList.add('active');
  activeCellEl = cellEl;

  // Format date
  const d = new Date(ds + 'T00:00:00');
  panelDate.textContent = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} · ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][dayOfWeek(d)]}`;

  // Build experiment rows
  panelContent.innerHTML = '';
  exps.forEach(e => {
    if (e.file) {
      const a = document.createElement('a');
      a.className = 'panel-exp-link';
      a.href = e.file;
      a.target = '_blank';
      a.innerHTML = `
        <div style="flex:1;min-width:0">
          <div class="panel-exp-title">${e.title}</div>
          <div class="panel-exp-desc">${e.desc}</div>
        </div>
        <span class="panel-exp-badge">交互版本</span>
        <span class="panel-arrow">↗</span>
      `;
      panelContent.appendChild(a);
    } else {
      const div = document.createElement('div');
      div.className = 'panel-exp-nolink';
      div.innerHTML = `
        <div style="flex:1;min-width:0">
          <div class="panel-exp-title">${e.title}</div>
          <div class="panel-exp-desc">${e.desc}</div>
        </div>
        <span class="panel-exp-badge no-file">仅截图留存</span>
      `;
      panelContent.appendChild(div);
    }
  });

  panel.classList.add('open');
  setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

/* ── Recent experiments list ─────────────────────────────── */
function buildRecentList(experiments) {
  const list = document.getElementById('exp-list');
  const recent = [...experiments].reverse().slice(0, 8);
  recent.forEach((e, i) => {
    const num = experiments.length - i;
    if (e.file) {
      const a = document.createElement('a');
      a.className = 'exp-row';
      a.href = e.file;
      a.target = '_blank';
      a.innerHTML = `
        <div class="exp-num">${num}</div>
        <div class="exp-body">
          <div class="exp-title-text">${e.title}</div>
          <div class="exp-meta-text">${e.desc}</div>
        </div>
        <div class="exp-date-col">${e.date.slice(5)}</div>
      `;
      list.appendChild(a);
    } else {
      const div = document.createElement('div');
      div.className = 'exp-row no-link';
      div.innerHTML = `
        <div class="exp-num" style="-webkit-text-fill-color:var(--fg-mute);background:none;color:var(--fg-mute)">${num}</div>
        <div class="exp-body">
          <div class="exp-title-text">${e.title}</div>
          <div class="exp-meta-text">${e.desc} · 仅截图留存</div>
        </div>
        <div class="exp-date-col">${e.date.slice(5)}</div>
      `;
      list.appendChild(div);
    }
  });
}
</script>
</body>
</html>
